<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="此刻">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <!-- 预加载主应用，加快跳转速度 -->
    <link rel="preload" href="Mynote.html" as="document">

    <!-- 深/浅色模式状态栏颜色跟随 -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

    <!-- 注意：原有的自动跳转脚本已移除。现在所有启动方式都先展示恐龙启动页。 -->

<style>
    :root {
        --primary-bg: #ffffff;
        --text-main: #1a1a1a;
        --text-secondary: #8e8e93;
        --btn-bg: rgba(240, 240, 242, 0.7);
        --border-color: rgba(0, 0, 0, 0.08);
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --primary-bg: #000000;
            --text-main: #ffffff;
            --text-secondary: #98989d;
            --btn-bg: rgba(44, 44, 46, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
        height: 100%;
        background-color: var(--primary-bg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
        color: var(--text-main);
    }

    .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 0;
        padding-bottom: env(safe-area-inset-bottom);
    }

    /* 恐龙 */
    .dino {
        font-size: 72px;
        line-height: 1;
        margin-bottom: 20px;
        animation: dinoFloat 2.4s ease-in-out infinite;
    }
    @keyframes dinoFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    /* SVG 加载圈 */
    .spinner {
        width: 36px;
        height: 36px;
        margin-bottom: 24px;
        animation: spinRotate 1.1s linear infinite;
    }
    @keyframes spinRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    .spinner circle {
        fill: none;
        stroke: var(--text-secondary);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-dasharray: 60 40;
    }

    /* 倒计时文字 */
    .countdown-text {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 16px;
        letter-spacing: 0.2px;
    }

    /* 手动进入按钮，引用 app 胶囊样式 */
    .enter-btn {
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-main);
        background: var(--btn-bg);
        border: 0.5px solid var(--border-color);
        border-radius: 20px;
        padding: 8px 22px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        cursor: pointer;
        letter-spacing: -0.2px;
    }
    .enter-btn:active {
        opacity: 0.7;
    }
</style>

</head>
<body>
    <div class="splash">
        <div class="dino">🦖</div>

        <svg class="spinner" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="15" />
        </svg>

        <div class="countdown-text" id="countdown">6 秒后自动进入</div>
        <button class="enter-btn" onclick="window.location.replace('Mynote.html')">立即进入</button>
    </div>

    <script>
        let seconds = 6;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.replace('Mynote.html');
            } else {
                el.textContent = seconds + ' 秒后自动进入';
            }
        }, 1000);
    </script>

</body>
</html>
