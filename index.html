<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script>
        // 2. 核心逻辑：如果是桌面打开，跳到笔记；如果是浏览器打开，也跳到笔记（或保留在首页）
        (function() {
            const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
            if (isStandalone || window.location.search.includes('from=safari')) {
                window.location.replace('Mynote.html');
            }
        })();
    </script>
</head>
<body>
    <div style="font-family:sans-serif; text-align:center; margin-top:50px; color:#888;">
        Loading...
    </div>
</body>
</html>
