<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ---- 示例数据（首次启动时写入 localStorage）----
    const SAMPLE = [
        { id: "1", title: "本周工作计划", content: "完成季度报告\n准备周五会议材料", pinned: true,  updatedAt: new Date(Date.now() - 3e5).toISOString() },
        { id: "2", title: "读书笔记",     content: "《思考，快与慢》系统1与系统2", pinned: false, updatedAt: new Date(Date.now() - 86400000).toISOString() },
        { id: "3", title: "购物清单",     content: "牛奶 × 2 / 面包 / 当季水果",  pinned: false, updatedAt: new Date(Date.now() - 172800000).toISOString() },
    ];

    // ---- 时间格式化 ----
    function timeAgo(iso) {
        const diff = Date.now() - new Date(iso).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 1)  return "刚刚";
        if (m < 60) return `${m} 分钟前`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h} 小时前`;
        const d = new Date(iso);
        const now = new Date();
        if (d.getFullYear() === now.getFullYear())
            return `${d.getMonth()+1}/${d.getDate()}`;
        return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    }

    // ---- 左滑行组件 ----
    function SwipeRow({ memo, onOpen, onPin, onDelete }) {
        const rowRef = useRef(null);
        const startXRef = useRef(null);
        const startYRef = useRef(null);
        const currentXRef = useRef(0);
        const openedRef = useRef(false);
        const swipingRef = useRef(false);
        const ACTION_W = 140;
        const THRESHOLD = 55;
        const MIN_DX = 5;

        const setTranslate = (x) => {
            if (rowRef.current) rowRef.current.style.transform = `translateX(${x}px)`;
        };
        const snapOpen  = () => { setTranslate(-ACTION_W); openedRef.current = true;  currentXRef.current = -ACTION_W; };
        const snapClose = () => { setTranslate(0);          openedRef.current = false; currentXRef.current = 0; swipingRef.current = false; };

        const onTouchStart = (e) => {
            startXRef.current = e.touches[0].clientX;
            startYRef.current = e.touches[0].clientY;
            swipingRef.current = false;
            if (rowRef.current) rowRef.current.style.transition = "none";
        };

        const onTouchMove = (e) => {
            if (startXRef.current === null) return;
            const dx = e.touches[0].clientX - startXRef.current;
            const dy = e.touches[0].clientY - startYRef.current;
            if (!swipingRef.current && Math.abs(dy) > Math.abs(dx) + 8) {
                snapClose(); startXRef.current = null; return;
            }
            if (!swipingRef.current && Math.abs(dx) > MIN_DX) swipingRef.current = true;
            if (!swipingRef.current) return;
            e.preventDefault();
            const base = openedRef.current ? -ACTION_W : 0;
            const next = Math.min(0, Math.max(-ACTION_W, base + dx));
            setTranslate(next);
            currentXRef.current = next;
        };

        const onTouchEnd = () => {
            if (rowRef.current) rowRef.current.style.transition = "transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)";
            if (openedRef.current) {
                currentXRef.current > -ACTION_W + THRESHOLD ? snapClose() : snapOpen();
            } else {
                currentXRef.current < -THRESHOLD ? snapOpen() : snapClose();
            }
            startXRef.current = null;
        };

        const handleClick = () => {
            if (openedRef.current) { snapClose(); return; }
            onOpen();
        };

        return (
            <div className="swipe-wrapper">
                {/* 操作按钮层 */}
                <div className="swipe-actions">
                    <button className="swipe-action-btn"
                        style={{ background: "#4A90D9" }}
                        onClick={e => { e.stopPropagation(); snapClose(); onPin(memo.id); }}>
                        <span>📌</span>{memo.pinned ? "取消置顶" : "置顶"}
                    </button>
                    <button className="swipe-action-btn"
                        style={{ background: "#E0433A" }}
                        onClick={e => { e.stopPropagation(); snapClose(); onDelete(memo.id); }}>
                        <span>🗑️</span>删除
                    </button>
                </div>
                {/* 笔记行 */}
                <div ref={rowRef} className="list-item"
                    onClick={handleClick}
                    onTouchStart={onTouchStart}
                    onTouchMove={onTouchMove}
                    onTouchEnd={onTouchEnd}>
                    <div className="item-left">
                        <div className="item-title">
                            {memo.pinned && <span className="pin-dot" />}
                            {memo.title || "无标题"}
                        </div>
                        <div className="item-preview">
                            {memo.content?.replace(/\n/g, " ") || "暂无内容"}
                        </div>
                    </div>
                    <div className="item-right">
                        <span className="item-time">{timeAgo(memo.updatedAt)}</span>
                    </div>
                </div>
            </div>
        );
    }

    // ---- 编辑器组件 ----
    function Editor({ memo, onClose, onSave }) {
        const [title, setTitle] = useState(memo.title === "无标题" ? "" : memo.title);
        const [content, setContent] = useState(memo.content || "");
        const saveTimer = useRef(null);
        const bodyRef = useRef(null);

        const doSave = useCallback((t, c) => {
            onSave(memo.id, {
                title: t.trim() || "无标题",
                content: c,
                updatedAt: new Date().toISOString()
            });
        }, [memo.id, onSave]);

        const autoSave = (t, c) => {
            clearTimeout(saveTimer.current);
            saveTimer.current = setTimeout(() => doSave(t, c), 600);
        };

        // 关闭前立即保存
        const handleClose = () => {
            clearTimeout(saveTimer.current);
            doSave(title, content);
            onClose();
        };

        const autoResize = (el) => {
            if (!el) return;
            el.style.height = "auto";
            el.style.height = el.scrollHeight + "px";
        };

        useEffect(() => {
            if (bodyRef.current) autoResize(bodyRef.current);
        }, []);

        const charCount = content.replace(/\n/g, "").length;

        return (
            <div style={{
                position: "fixed", inset: 0, zIndex: 3000,
                background: "var(--primary-bg)",
                animation: "slideUp 0.28s cubic-bezier(0.32,0.72,0,1)",
            }}>
                {/* ── 顶部：绝对定位透明浮层，与首页 header 完全一致 ── */}
                <header style={{
                    position: "absolute", top: 0, left: 0, right: 0,
                    zIndex: 2000,
                    paddingTop: "env(safe-area-inset-top)",
                    background: "transparent",
                    pointerEvents: "none",
                    transform: "translateZ(0)",
                    WebkitTransform: "translateZ(0)",
                    willChange: "transform",
                }}>
                    <div style={{
                        height: 44, display: "flex", alignItems: "center",
                        justifyContent: "space-between",
                        padding: "0 16px", gap: 12,
                        pointerEvents: "auto",
                    }}>
                        <button onClick={handleClose} style={{
                            background: "var(--btn-bg)",
                            color: "var(--text-main)",
                            padding: "6px 12px",
                            borderRadius: 18, fontSize: 14, fontWeight: 500,
                            border: "0.5px solid var(--border-color)",
                            backdropFilter: "blur(8px)",
                            WebkitBackdropFilter: "blur(8px)",
                            cursor: "pointer", fontFamily: "inherit",
                            transform: "translateZ(0)",
                        }}>‹ 返回</button>
                        <button style={{
                            background: "var(--btn-bg)",
                            color: "var(--text-main)",
                            padding: "6px 12px",
                            borderRadius: 18, fontSize: 14, fontWeight: 500,
                            border: "0.5px solid var(--border-color)",
                            backdropFilter: "blur(8px)",
                            WebkitBackdropFilter: "blur(8px)",
                            cursor: "pointer", fontFamily: "inherit",
                            transform: "translateZ(0)",
                        }}>…</button>
                    </div>
                </header>

                {/* ── 内容区：全屏滚动，顶部底部自然穿透 ── */}
                <div style={{
                    position: "absolute", inset: 0,
                    overflowY: "auto",
                    WebkitOverflowScrolling: "touch",
                    paddingTop: "calc(env(safe-area-inset-top) + 60px)",
                    paddingBottom: "calc(env(safe-area-inset-bottom) + 40px)",
                    paddingLeft: 20,
                    paddingRight: 20,
                }}>
                    <textarea
                        value={title}
                        onChange={e => { setTitle(e.target.value); autoSave(e.target.value, content); autoResize(e.target); }}
                        placeholder="标题"
                        rows={1}
                        style={{
                            width: "100%", fontSize: 26, fontWeight: 700,
                            color: "var(--text-main)", lineHeight: 1.3,
                            border: "none", outline: "none", resize: "none",
                            background: "transparent", fontFamily: "inherit",
                            letterSpacing: "-0.5px", marginBottom: 10,
                            overflow: "hidden", display: "block",
                        }}
                    />
                    <div style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 20 }}>
                        {timeAgo(memo.updatedAt)}{charCount > 0 ? ` · ${charCount} 字` : ""}
                    </div>
                    <textarea
                        ref={bodyRef}
                        value={content}
                        onChange={e => { setContent(e.target.value); autoSave(title, e.target.value); autoResize(e.target); }}
                        placeholder="开始书写…"
                        rows={1}
                        autoFocus
                        style={{
                            width: "100%", fontSize: 16,
                            color: "var(--text-main)", lineHeight: 1.75,
                            border: "none", outline: "none", resize: "none",
                            background: "transparent", fontFamily: "inherit",
                            overflow: "hidden", minHeight: "60vh", display: "block",
                        }}
                    />
                </div>
            </div>
        );
    }

    // ---- 主列表组件 ----
    function MemoList() {
        const [memos, setMemos] = useState(() => {
            try {
                const saved = localStorage.getItem("memos_app_v2");
                return saved ? JSON.parse(saved) : SAMPLE;
            } catch { return SAMPLE; }
        });

        const [editingMemo, setEditingMemo] = useState(null);

        const openEditor = (memo) => {
            document.querySelector("header").style.visibility = "hidden";
            document.querySelector(".page-title").style.visibility = "hidden";
            setEditingMemo(memo);
        };

        const closeEditor = () => {
            document.querySelector("header").style.visibility = "visible";
            document.querySelector(".page-title").style.visibility = "visible";
            setEditingMemo(null);
        };

        // 持久化
        useEffect(() => {
            try { localStorage.setItem("memos_app_v2", JSON.stringify(memos)); }
            catch (e) { console.warn("localStorage 写入失败", e); }
        }, [memos]);

        // 新建按钮
        useEffect(() => {
            const btn = document.getElementById("new-btn");
            if (!btn) return;
            const handler = () => {
                const id = Date.now().toString();
                const newMemo = { id, title: "无标题", content: "", pinned: false, updatedAt: new Date().toISOString() };
                setMemos(ms => [newMemo, ...ms]);
                openEditor(newMemo);
            };
            btn.addEventListener("click", handler);
            return () => btn.removeEventListener("click", handler);
        }, []);

        const togglePin = (id) => {
            setMemos(ms => ms.map(m => m.id === id ? { ...m, pinned: !m.pinned, updatedAt: new Date().toISOString() } : m));
        };

        const deleteMemo = (id) => {
            setMemos(ms => ms.filter(m => m.id !== id));
            if (editingMemo?.id === id) closeEditor();
        };

        const saveMemo = useCallback((id, changes) => {
            setMemos(ms => ms.map(m => m.id === id ? { ...m, ...changes } : m));
        }, []);

        const sorted = [...memos].sort((a, b) =>
            (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) ||
            new Date(b.updatedAt) - new Date(a.updatedAt)
        );

        return (
            <>
                {sorted.length === 0
                    ? <div className="empty-tip">暂无笔记，点击右上角新建</div>
                    : (
                        <div className="list-group">
                            {sorted.map(memo => (
                                <SwipeRow
                                    key={memo.id}
                                    memo={memo}
                                    onOpen={() => openEditor(memo)}
                                    onPin={togglePin}
                                    onDelete={deleteMemo}
                                />
                            ))}
                        </div>
                    )
                }
                {editingMemo && (
                    <Editor
                        memo={editingMemo}
                        onClose={closeEditor}
                        onSave={saveMemo}
                    />
                )}
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById("memo-list-root")).render(<MemoList />);
</script>

<script>
    // PWA standalone 模式内部跳转
    (function() {
        if (("standalone" in window.navigator) && window.navigator.standalone) {
            document.addEventListener("click", function(e) {
                let nod = e.target;
                while (nod && nod.nodeName !== "A") nod = nod.parentNode;
                if (nod && "href" in nod && (nod.href.indexOf(window.location.host) !== -1 || nod.href.startsWith("/") || nod.href.startsWith("#"))) {
                    e.preventDefault();
                    window.location.href = nod.href;
                }
            }, false);
        }
    })();
</script>
