                const newMemo = { id: Date.now().toString(), title: "无标题", doc: [{ id: genId(), type: "paragraph", children: [{ text: "" }] }], pinned: false, createdAt: now, updatedAt: now };
                setMemos(ms => [newMemo, ...ms]);
                scrollRestoreRef.current = window.scrollY;
                setEditingMemoId(newMemo.id);
            };

            const togglePin = (id) => { if (id === NEW_CARD_ID) return; setMemos(ms => ms.map(m => m.id === id ? Object.assign({}, m, { pinned: !m.pinned, updatedAt: new Date().toISOString() }) : m)); };
            const deleteMemo = (id) => {
                if (id === NEW_CARD_ID) return;
                const target = memos.find(m => m.id === id);
                if (target && target.doc) {
                    const fileIds = target.doc.filter(n => n.type === "attachment").map(n => n.fileId);
                    if (fileIds.length > 0) { getDB().then(db => { fileIds.forEach(fid => deleteAttachmentFromDB(db, fid).catch(() => { })); }).catch(() => { }); }
                }
                setMemos(ms => ms.filter(m => m.id !== id));
                if (editingMemo && editingMemo.id === id) closeEditor();
            };
            const saveMemo = useCallback((id, changes) => setMemos(ms => ms.map(m => m.id === id ? Object.assign({}, m, changes) : m)), []);

            const newCardDoc = useMemo(() => [{ id: genId(), type: "paragraph", children: [{ text: "" }] }], []);

            const sorted = useMemo(() => { return [...memos].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.updatedAt) - new Date(a.updatedAt)); }, [memos]);

            const groupedItems = useMemo(() => {
                const groups = [];
                let pinnedMemos = [];
                let currentLabel = null;
                let currentMemos = [];
                sorted.forEach(memo => {
                    if (memo.pinned) { pinnedMemos.push(memo); return; }
                    const label = getSectionLabel(memo.createdAt || memo.updatedAt);
                    if (label !== currentLabel) { if (currentLabel !== null && currentMemos.length > 0) { groups.push({ label: currentLabel, memos: currentMemos }); } currentLabel = label; currentMemos = [memo]; }
                    else { currentMemos.push(memo); }
                });
                if (currentLabel !== null && currentMemos.length > 0) { groups.push({ label: currentLabel, memos: currentMemos }); }
                if (pinnedMemos.length > 0) { groups.unshift({ label: "置顶", memos: pinnedMemos }); }
                return groups;
            }, [sorted]);

            const isEditorOpen = !!editingMemo;

            if (backupView) {
                return <BackupView onClose={() => setBackupView(false)} />;
            }

            return (
                <>
                    {!isEditorOpen && (
                        <div>
                            <header className="main-header"><div className="header-actions"></div></header>
                            <div className="page-title compact" style={{ visibility: isCompact ? 'visible' : 'hidden', opacity: isCompact ? 1 : 0, pointerEvents: 'auto' }} onClick={() => setBackupView(true)}>此刻</div>
                            <h1 className="page-title" style={{ transform: `scale(${titleScale}) translateY(${titleTranslateY}px)`, opacity: isCompact ? 0 : titleOpacity, visibility: isCompact ? 'hidden' : 'visible', transformOrigin: 'left center', pointerEvents: 'auto', cursor: 'pointer' }} onClick={() => setBackupView(true)}>此刻</h1>
                            <div className="container">
                                <div className="list-group">
                                    <SwipeRow memo={{ id: NEW_CARD_ID, title: "新建笔记", doc: newCardDoc, pinned: true, createdAt: "", updatedAt: "", isVirtual: true }} onOpen={() => handleNew()} onPin={() => { }} onDelete={() => { }} />
                                </div>
                                {sorted.length === 0 ? <div className="empty-tip">暂无笔记，点击上方新建</div> : groupedItems.map((group, gi) => (
                                    <div key={`group-${group.label}-${gi}`}>
                                        <div className="section-header">{group.label}</div>
                                        <div className="list-group">{group.memos.map(memo => <SwipeRow key={memo.id} memo={memo} onOpen={() => openEditor(memo)} onPin={togglePin} onDelete={deleteMemo} />)}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {editingMemo && <Editor memo={editingMemo} onClose={closeEditor} onSave={saveMemo} />}
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById("memo-list-root")).render(<MemoList />);
    </script>

    <script>
        (function () {
            if (("standalone" in window.navigator) && window.navigator.standalone) {
                document.addEventListener("click", function (e) {
                    let nod = e.target;
                    while (nod && nod.nodeName !== "A") nod = nod.parentNode;
                    if (nod && "href" in nod && (nod.href.indexOf(window.location.host) !== -1 || nod.href.startsWith("/") || nod.href.startsWith("#"))) {
                        e.preventDefault();
                        window.location.href = nod.href;
                    }
                }, false);
            }
        })();
    </script>
</body>
</html>
