                await packAttachmentsToZip(db, zipData, (i, total) => showStatus(`正在打包附件 ${i + 1}/${total}...`));
                const zipped = fflate.zipSync(zipData, { level: 6 });
                const fileName = `此刻备份_${new Date().toISOString().slice(0, 10)}.zip`;
                const blob = new Blob([zipped], { type: 'application/zip' });
                /* ---- 优先使用系统 Share Sheet (iOS 原生分享) ---- */
                if (navigator.share && navigator.canShare) {
                    try {
                        const file = new File([zipped], fileName, { type: 'application/zip' });
                        if (navigator.canShare({ files: [file] })) {
                            await navigator.share({ files: [file], title: '此刻备份' });
                            showStatus('✅ 备份已分享');
                            addHistoryEntry('export', 'success', '文件已分享', fileName);
                            setBackupLoading(false);
                            return;
                        }
                    } catch (shareErr) {
                        if (shareErr.name === 'AbortError') { setBackupLoading(false); return; }
                        // fallback to download
                    }
                }
                /* ---- 回退：浏览器下载 ---- */
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);
                showStatus('✅ 本地备份已下载 (.zip)');
                addHistoryEntry('export', 'success', '备份已下载', fileName);
            } catch (e) { showStatus('❌ 导出失败: ' + e.message); addHistoryEntry('export', 'fail', '导出失败', e.message); }
            finally { setBackupLoading(false); }
        }, [backupLoading, showStatus, buildBackupPayload, addHistoryEntry]);

        const handleConfirmImportRestore = useCallback(async () => {
            if (!pendingImportFile) return;
            const file = pendingImportFile;
            setShowImportConfirm(false);
            setPendingImportFile(null);
            showStatus('正在读取备份文件...');
            setRestoreLoading(true);
            try {
                const buf = await file.arrayBuffer();
                const unzipped = fflate.unzipSync(new Uint8Array(buf));
                const jsonBytes = unzipped['memos.json'];
                if (!jsonBytes) throw new Error('ZIP 中未找到备份数据');
                const backup = JSON.parse(fflate.strFromU8(jsonBytes));
                if (!backup.memos || !Array.isArray(backup.memos)) throw new Error('无效的备份文件，未找到备忘录数据');
                const db = await getDB();
                const newMemosStr = JSON.stringify(backup.memos);
                const oldMemos = JSON.parse(localStorage.getItem('memos_app_v2') || '[]');
                for (const m of oldMemos) if (m.doc) for (const n of m.doc) if (n.type === 'attachment') await deleteAttachmentFromDB(db, n.fileId).catch(() => {});
                const { success, fail } = await restoreAttachmentsFromZip(unzipped, db);
                if (fail > 0) showStatus(`附件恢复完成：成功 ${success}，跳过 ${fail}`);
                await restoreAvatars(backup.avatars, db);
                localStorage.setItem('memos_app_v2', newMemosStr);
                showStatus('✅ 恢复成功！正在刷新页面...');
                addHistoryEntry('restore', 'success', '从本地文件恢复', file.name);
                setTimeout(() => window.location.reload(), 800);
            } catch (e) { showStatus('❌ 导入失败: ' + e.message); addHistoryEntry('restore', 'fail', '导入失败', e.message); }
            finally { setRestoreLoading(false); }
        }, [pendingImportFile, restoreLoading, showStatus, addHistoryEntry]);

        const handleImportLocal = useCallback(async () => {
            if (restoreLoading) return;
            const input = document.createElement('input');
            input.type = 'file'; input.accept = '.zip'; input.style.display = 'none';
            document.body.appendChild(input);
            input.onchange = async (e) => {
                try {
                    const file = e.target.files[0];
                    if (!file) return;
                    setPendingImportFile(file);
                    setShowImportConfirm(true);
                } finally {
                    try { document.body.removeChild(input); } catch (_) {}
                }
            };
            input.oncancel = () => {
                try { document.body.removeChild(input); } catch (_) {}
            };
            input.click();
        }, [restoreLoading]);

        const checkTokenExpiry = useCallback((resp) => {
            if (resp.status === 401) { setGoogleToken(null); localStorage.removeItem('google_token'); return true; }
            return false;
        }, []);

        const handleGoogleAuth = useCallback(() => {
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) { showStatus('❌ Google API 未加载，请刷新页面后重试'); return; }
            const client = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.appdata',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        setGoogleToken(tokenResponse.access_token);
                        localStorage.setItem('google_token', tokenResponse.access_token);
                        showStatus('✅ Google 账号已连接');
                        addHistoryEntry('connect', 'success', 'Google 账号已连接', '');
                    } else { showStatus('❌ 授权失败，请重试'); addHistoryEntry('connect', 'fail', 'Google 授权失败', ''); }
                },
                error_callback: () => { showStatus('❌ 授权被取消或失败'); addHistoryEntry('connect', 'fail', 'Google 授权被取消', ''); },
            });
            client.requestAccessToken({ prompt: 'consent' });
        }, [showStatus, addHistoryEntry]);

        const handleGoogleLogout = useCallback(() => {
            if (googleToken && typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) google.accounts.oauth2.revoke(googleToken, () => {});
            setGoogleToken(null); localStorage.removeItem('google_token'); showStatus('已断开 Google 账号');
        }, [googleToken, showStatus]);

        const handleCloudBackup = useCallback(async () => {
            if (!googleToken) return showStatus('❌ 请先连接 Google 账号');
            if (backupLoading) return;
            setBackupLoading(true);
            try {
                const backup = await buildBackupPayload();
                showStatus('正在打包附件...');
                const zipData = {};
                zipData['memos.json'] = fflate.strToU8(JSON.stringify(backup, null, 2));
                const db = await getDB();
                await packAttachmentsToZip(db, zipData, (i, total) => showStatus(`正在打包附件 ${i + 1}/${total}...`));
                const tx = db.transaction('avatars', 'readonly');
                const allAvatars = await new Promise(res => { const req = tx.objectStore('avatars').getAll(); req.onsuccess = () => res(req.result); });
                if (allAvatars.length > 0) {
                    const avatarsObj = {}; for (const a of allAvatars) avatarsObj[a.id] = a.dataUrl;
                    zipData['avatars.json'] = fflate.strToU8(JSON.stringify(avatarsObj));
                }
                const zipped = fflate.zipSync(zipData, { level: 3 });
                const blob = new Blob([zipped], { type: 'application/zip' });
                const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${BACKUP_FILE_NAME}' and trashed=false&spaces=appDataFolder&fields=files(id)`, { headers: { Authorization: `Bearer ${googleToken}` } });
                if (checkTokenExpiry(listResp)) return;
                const listData = await listResp.json();
                let fileId = null; if (listData.files && listData.files.length > 0) fileId = listData.files[0].id;
                const metadata = fileId ? { name: BACKUP_FILE_NAME, mimeType: 'application/zip' } : { name: BACKUP_FILE_NAME, mimeType: 'application/zip', parents: ['appDataFolder'] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', blob);
                const url = fileId ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart` : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
                const method = fileId ? 'PATCH' : 'POST';
                const uploadResp = await fetch(url, { method, headers: { Authorization: `Bearer ${googleToken}` }, body: form });
                if (checkTokenExpiry(uploadResp)) return;
                if (!uploadResp.ok) { const errData = await uploadResp.json().catch(() => ({})); throw new Error(errData.error?.message || `HTTP ${uploadResp.status}`); }
                showStatus('✅ 云端备份完成');
                addHistoryEntry('upload', 'success', '云端备份成功', (backup.memos||[]).length + ' 条笔记');
            } catch (e) { showStatus('❌ 云端备份失败: ' + e.message); addHistoryEntry('upload', 'fail', '云端备份失败', e.message); }
            finally { setBackupLoading(false); }
        }, [googleToken, checkTokenExpiry, backupLoading, showStatus, buildBackupPayload, addHistoryEntry]);

        const handleCloudMerge = useCallback(async () => {
            if (!googleToken) return showStatus('❌ 请先连接 Google 账号');
            if (restoreLoading) return;
            if (!window.confirm('从云端合并到本地？云端数据将与本地合并，重复项以云端为准，本地数据不会被覆盖。')) return;
            setRestoreLoading(true);
            showStatus('正在下载云端备份...');
            try {
                const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${BACKUP_FILE_NAME}' and trashed=false&spaces=appDataFolder&fields=files(id)`, { headers: { Authorization: `Bearer ${googleToken}` } });
                if (checkTokenExpiry(listResp)) return;
                const listData = await listResp.json();
                if (!listData.files || listData.files.length === 0) return showStatus('❌ 云端无备份文件');
                const fileId = listData.files[0].id;
                const dlResp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${googleToken}` } });
                if (checkTokenExpiry(dlResp)) return;
                const buf = await dlResp.arrayBuffer();
                const unzipped = fflate.unzipSync(new Uint8Array(buf));
                const cloudBackup = JSON.parse(fflate.strFromU8(unzipped['memos.json']));
                if (!cloudBackup.memos) throw new Error('无效的备份文件');
                const localMemos = JSON.parse(localStorage.getItem('memos_app_v2') || '[]');
                const cloudIds = new Set(cloudBackup.memos.map(m => m.id));
                const merged = [...cloudBackup.memos, ...localMemos.filter(m => !cloudIds.has(m.id))];
                const db = await getDB();
                for (const attPath of Object.keys(unzipped).filter(k => k.startsWith('attachments/'))) {
                    const bytes = unzipped[attPath]; if (!bytes) continue;
                    const fileName = attPath.replace('attachments/', '');
                    const firstUnderscore = fileName.indexOf('_');
                    const fileId = firstUnderscore > 0 ? fileName.slice(0, firstUnderscore) : fileName;
                    const displayName = firstUnderscore > 0 ? fileName.slice(firstUnderscore + 1) : fileName;
                    const local = await loadAttachmentFromDB(db, fileId).catch(() => null);
                    if (!local) {
                        const mime = guessMimeFromName(displayName);
                        const blob = new Blob([bytes], { type: mime });
                        const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
                        const regenThumb = await createThumbnail(dataUrl).catch(() => null);
                        await saveAttachmentToDB(db, { id: fileId, name: displayName, type: mime, url: dataUrl, thumb: regenThumb });
                    }
                }
                const cloudAvatars = unzipped['avatars.json'] ? JSON.parse(fflate.strFromU8(unzipped['avatars.json'])) : null;
                await restoreAvatars(cloudAvatars || cloudBackup.avatars, db);
                localStorage.setItem('memos_app_v2', JSON.stringify(merged));
                showStatus('✅ 合并成功！正在刷新...');
                setTimeout(() => window.location.reload(), 800);
            } catch (e) { showStatus('❌ 合并失败: ' + e.message); }
            finally { setRestoreLoading(false); }
        }, [googleToken, checkTokenExpiry, restoreLoading, showStatus]);

        const handleCloudRestore = useCallback(async () => {
            if (!googleToken) return showStatus('❌ 请先连接 Google 账号');
            if (restoreLoading) return;
            if (!window.confirm('确认从云端恢复？当前所有数据将被覆盖，此操作不可撤销。')) return;
            setRestoreLoading(true);
            showStatus('正在从云端下载...');
            try {
                const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${BACKUP_FILE_NAME}' and trashed=false&spaces=appDataFolder&fields=files(id)`, { headers: { Authorization: `Bearer ${googleToken}` } });
                if (checkTokenExpiry(listResp)) return;
                const listData = await listResp.json();
                if (!listData.files || listData.files.length === 0) return showStatus('❌ 云端无备份文件');
                const fileId = listData.files[0].id;
                const dlResp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${googleToken}` } });
                if (checkTokenExpiry(dlResp)) return;
                const buf = await dlResp.arrayBuffer();
                const unzipped = fflate.unzipSync(new Uint8Array(buf));
                const backup = JSON.parse(fflate.strFromU8(unzipped['memos.json']));
                if (!backup.memos) throw new Error('无效的备份文件');
                const db = await getDB();
                const newMemosStr = JSON.stringify(backup.memos);
                const oldMemos = JSON.parse(localStorage.getItem('memos_app_v2') || '[]');
                for (const m of oldMemos) if (m.doc) for (const n of m.doc) if (n.type === 'attachment') await deleteAttachmentFromDB(db, n.fileId).catch(() => {});
                const { success, fail } = await restoreAttachmentsFromZip(unzipped, db);
                if (fail > 0) showStatus(`附件恢复完成：成功 ${success}，跳过 ${fail}`);
                const backupAvatars = unzipped['avatars.json'] ? JSON.parse(fflate.strFromU8(unzipped['avatars.json'])) : null;
                await restoreAvatars(backupAvatars || backup.avatars, db);
                localStorage.setItem('memos_app_v2', newMemosStr);
                showStatus('✅ 云端恢复成功！正在刷新页面...');
                addHistoryEntry('restore', 'success', '从云端恢复', (backup.memos||[]).length + ' 条笔记');
                setTimeout(() => window.location.reload(), 800);
            } catch (e) { showStatus('❌ 云端恢复失败: ' + e.message); addHistoryEntry('restore', 'fail', '云端恢复失败', e.message); }
            finally { setRestoreLoading(false); }
        }, [googleToken, checkTokenExpiry, restoreLoading, showStatus, addHistoryEntry]);

        return (
            <div style={{ background: "var(--primary-bg)", minHeight: "100vh" }}>
                <button className="editor-fab left" onClick={handleClose}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <div className="page-title compact" style={{ visibility: "visible", opacity: 1, pointerEvents: "none" }}>备份与恢复</div>
                <div style={{ padding: "126px 20px 0", paddingBottom: "calc(env(safe-area-inset-bottom) + 40px)" }}>
                    <div style={{ animation: 'slideInFromRight 0.32s cubic-bezier(0.25,0.46,0.45,0.94) both' }}>
                    <div className="backup-hero">
                        <div className="backup-hero-top" style={{ marginBottom: 10 }}>
                            <div>
                                <div className="backup-hero-title">备份状态总览</div>
                            </div>
                            <div className={googleToken ? "backup-hero-badge connected" : "backup-hero-badge disconnected"}>{googleToken ? '已连接' : '未连接'}</div>
                        </div>
                        <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.5, display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
                            <span>☁️ Google Drive {googleToken ? '正常' : '未连接'}</span>
                            <span style={{ opacity: 0.3 }}>·</span>
                            <span>上次备份 {lastBackupTime}</span>
                            <span style={{ opacity: 0.3 }}>·</span>
                            <span>{JSON.parse(localStorage.getItem('memos_app_v2') || '[]').length} 条笔记{attachCount !== null ? ` · ${attachCount} 个附件` : ''}</span>
                        </div>
                    </div>

                    <div style={{ height: 12 }} />

                    <div className="backup-card">
                        <div className="backup-row" onClick={() => setShowExportConfirm(true)}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, minWidth: 0, flex: 1 }}>
                                <div style={{ width: 28, height: 28, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,122,255,0.10)', flex: '0 0 28px' }}>
                                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="#007aff" stroke-width="2" stroke-linecap="round"><path d="M12 3v13M9 10l3-3 3 3"/><path d="M5 16v3a2 2 0 002 2h10a2 2 0 002-2v-3"/></svg>
                                </div>
                                <div>
                                    <div className="backup-row-title">导出备份</div>
                                    <div className="backup-row-desc">分享 zip 到系统文件 App</div>
                                </div>
                            </div>
                            <div className="backup-row-right"><span className="backup-row-arrow">›</span></div>
                        </div>
                        <div className="backup-row no-border" onClick={handleImportLocal}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, minWidth: 0, flex: 1 }}>
                                <div style={{ width: 28, height: 28, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,122,255,0.10)', flex: '0 0 28px' }}>
                                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="#007aff" stroke-width="2" stroke-linecap="round"><path d="M4 4h12v12H4z"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
                                </div>
                                <div>
                                    <div className="backup-row-title">导入备份</div>
                                    <div className="backup-row-desc">从文件 App 选择 zip 恢复</div>
                                </div>
                            </div>
                            <div className="backup-row-right"><span className="backup-row-arrow">›</span></div>
                        </div>
                    </div>

                    <div style={{ height: 12 }} />

                    <div className="backup-card">
                        <div className="backup-row" style={{ cursor: 'default' }}>
                            <div className="backup-row-left">
                                <div className="backup-row-title">Google Drive 云备份</div>
                                <div className="backup-row-desc">开启后，笔记与附件将自动备份到云端。</div>
                            </div>
                            <div className={googleToken ? "backup-state connected" : "backup-state disconnected"}>{googleToken ? '已连接' : '未连接'}</div>
                        </div>
                        <div style={{ padding: '10px 14px 14px', borderTop: '0.5px solid var(--border-color)' }}>
                            {!googleToken ? (
                                <button className="backup-btn primary" onClick={handleGoogleAuth} disabled={isLoading} style={{ width: '100%', marginRight: 0, height: 44 }}>连接 Google 账号</button>
                            ) : (
                                <>
                                    <button className="backup-btn primary" onClick={handleCloudBackup} disabled={backupLoading || restoreLoading} style={{ width: '100%', marginRight: 0, height: 44, marginBottom: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3v12M7 12l3 3 3-3"/><path d="M4 16v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
                                        {backupLoading ? '备份中...' : '上传到云端'}
                                    </button>
                                    <div style={{ display: 'flex', gap: 8 }}>
                                        <button className="backup-btn secondary" onClick={handleGoogleLogout} disabled={isLoading} style={{ flex: 1 }}>断开账号</button>
                                        <button className="backup-btn secondary" onClick={() => setShowRestoreSheet(true)} disabled={backupLoading || restoreLoading} style={{ flex: 1 }}>从云端恢复</button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>

                    {history.length > 0 && (
                        <>
                            <div className="backup-section-title" style={{ marginTop: 16 }}>最近操作</div>
                            <div className="backup-card" style={{ padding: '2px 0' }}>
                                {history.slice(0, 6).map(function(entry, i) {
                                    var dotColor = entry.status === 'success' ? '#34c759' : (entry.status === 'fail' ? '#ff3b30' : '#007aff');
                                    var typeLabel = entry.type === 'upload' ? '云端' : (entry.type === 'export' ? '导出' : (entry.type === 'restore' ? '恢复' : '连接'));
                                    var ts = entry.timestamp ? entry.timestamp.slice(0, 16).replace('T', ' ') : '';
                                    return React.createElement('div', { key: i, style: { display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderBottom: i < history.length - 1 && i < 5 ? '0.5px solid var(--border-color)' : 'none' } },
                                        React.createElement('div', { style: { width: 8, height: 8, borderRadius: '50%', background: dotColor, flexShrink: 0 } }),
                                        React.createElement('div', { style: { flex: 1, minWidth: 0 } },
                                            React.createElement('div', { style: { fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6 } },
                                                React.createElement('span', null, entry.message),
                                                React.createElement('span', { style: { fontSize: 9, fontWeight: 700, padding: '1px 6px', borderRadius: 999, textTransform: 'uppercase', letterSpacing: '0.3px', background: 'rgba(127,127,127,0.08)', color: 'var(--text-secondary)' } }, typeLabel)
                                            ),
                                            React.createElement('div', { style: { fontSize: 12, color: 'var(--text-secondary)', marginTop: 2, display: 'flex', alignItems: 'center', gap: 6 } },
                                                React.createElement('span', null, ts),
                                                entry.detail && React.createElement(React.Fragment, null, React.createElement('span', { style: { opacity: 0.3 } }, '·'), React.createElement('span', null, entry.detail))
                                            )
                                        )
                                    );
                                })}
                            </div>
                        </>
                    )}
                    </div>
                    {showExportConfirm && (
                        <>
                            <div onClick={() => setShowExportConfirm(false)} style={{ position: 'fixed', inset: 0, zIndex: 4000, background: 'transparent' }} />
                            <div style={{ position: 'fixed', left: 0, right: 0, bottom: 'calc(env(safe-area-inset-bottom) + 14px)', zIndex: 4001, display: 'flex', justifyContent: 'center', padding: '0 14px', pointerEvents: 'none' }}>
                                <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 600, background: 'var(--btn-bg)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)', border: '0.5px solid var(--border-color)', borderRadius: 28, padding: '14px 14px calc(14px + env(safe-area-inset-bottom))', boxShadow: '0 -8px 24px rgba(0,0,0,0.10)', pointerEvents: 'auto' }}>
                                    <div style={{ textAlign: 'center', fontSize: 18, fontWeight: 700, marginBottom: 12, color: 'var(--text-main)' }}>确认导出备份</div>
                                    <div style={{ fontSize: 13, lineHeight: 1.45, color: 'var(--text-secondary)', textAlign: 'center', marginBottom: 12 }}>打包全部笔记、附件与头像为 zip，将通过系统分享面板保存或发送。</div>
                                    <button className="backup-btn primary" onClick={() => { setShowExportConfirm(false); handleExportLocal(); }} style={{ width: '100%', marginRight: 0, height: 44, marginBottom: 10 }} disabled={backupLoading}>{backupLoading ? '导出中...' : '确认导出'}</button>
                                    <button className="backup-btn secondary" onClick={() => setShowExportConfirm(false)} style={{ width: '100%', marginRight: 0, height: 44 }}>取消</button>
                                </div>
                            </div>
                        </>
                    )}
                    {showImportConfirm && (
                        <>
                            <div onClick={() => { setShowImportConfirm(false); setPendingImportFile(null); }} style={{ position: 'fixed', inset: 0, zIndex: 4000, background: 'transparent' }} />
                            <div style={{ position: 'fixed', left: 0, right: 0, bottom: 'calc(env(safe-area-inset-bottom) + 14px)', zIndex: 4001, display: 'flex', justifyContent: 'center', padding: '0 14px', pointerEvents: 'none' }}>
                                <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 600, background: 'var(--btn-bg)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)', border: '0.5px solid var(--border-color)', borderRadius: 28, padding: '14px 14px calc(14px + env(safe-area-inset-bottom))', boxShadow: '0 -8px 24px rgba(0,0,0,0.10)', pointerEvents: 'auto' }}>
                                    <div style={{ textAlign: 'center', fontSize: 18, fontWeight: 700, marginBottom: 12, color: 'var(--text-main)' }}>确认恢复备份</div>
                                    <div style={{ fontSize: 13, lineHeight: 1.45, color: 'var(--text-secondary)', textAlign: 'center', marginBottom: 12 }}>当前所有数据将被覆盖，此操作不可撤销。</div>
                                    <button className="backup-btn primary" onClick={handleConfirmImportRestore} style={{ width: '100%', marginRight: 0, height: 44, marginBottom: 10 }} disabled={restoreLoading}>{restoreLoading ? '恢复中...' : '确认恢复'}</button>
                                    <button className="backup-btn secondary" onClick={() => { setShowImportConfirm(false); setPendingImportFile(null); }} style={{ width: '100%', marginRight: 0, height: 44 }}>取消</button>
                                </div>
                            </div>
                        </>
                    )}
                    {showRestoreSheet && (
                        <>
                            <div onClick={() => setShowRestoreSheet(false)} style={{ position: 'fixed', inset: 0, zIndex: 4000, background: 'transparent' }} />
                            <div style={{ position: 'fixed', left: 0, right: 0, bottom: 'calc(env(safe-area-inset-bottom) + 14px)', zIndex: 4001, display: 'flex', justifyContent: 'center', padding: '0 14px', pointerEvents: 'none' }}>
                                <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 600, background: 'var(--btn-bg)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)', border: '0.5px solid var(--border-color)', borderRadius: 28, padding: '14px 14px calc(14px + env(safe-area-inset-bottom))', boxShadow: '0 -8px 24px rgba(0,0,0,0.10)', pointerEvents: 'auto' }}>
                                    <div style={{ textAlign: 'center', fontSize: 18, fontWeight: 700, marginBottom: 12, color: 'var(--text-main)' }}>从云端恢复</div>
                                    <div onClick={() => { setShowRestoreSheet(false); handleCloudRestore(); }} style={{ border: '0.5px solid var(--border-color)', borderRadius: 22, padding: 14, marginBottom: 10, background: 'rgba(127,127,127,0.06)', cursor: 'pointer' }}>
                                        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 5, color: 'var(--text-main)' }}>覆盖本地恢复</div>
                                        <div style={{ fontSize: 13, lineHeight: 1.45, color: 'var(--text-secondary)' }}>清空本地后用云端完整替换，适合换设备或彻底回档。</div>
                                    </div>
                                    <div onClick={() => { setShowRestoreSheet(false); handleCloudMerge(); }} style={{ border: '0.5px solid var(--border-color)', borderRadius: 22, padding: 14, marginBottom: 12, background: 'rgba(127,127,127,0.06)', cursor: 'pointer' }}>
                                        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 5, color: 'var(--text-main)' }}>合并云端到本地</div>
                                        <div style={{ fontSize: 13, lineHeight: 1.45, color: 'var(--text-secondary)' }}>保留本地现有数据，只补入云端新增内容。</div>
                                    </div>
                                    <button className="backup-btn secondary backup-modal-cancel" onClick={() => setShowRestoreSheet(false)} style={{ width: '100%', marginRight: 0, height: 44 }}>取消</button>
                                </div>
                            </div>
                        </>
                    )}
                </div>
                {statusMsg && (function() {
                    var t = statusType || 'progress';
                    var txt = statusMsg.replace(/^[✅❌]\s*/, '');
                    var borderColor = t === 'success' ? 'rgba(52,199,89,0.24)' : t === 'error' ? 'rgba(224,67,58,0.24)' : 'rgba(0,122,255,0.22)';
                    var icon = t === 'success' ? '✅' : t === 'error' ? '❌' : '↑';
                    return React.createElement('div', { style: { position: 'fixed', left: 16, right: 16, bottom: 'calc(env(safe-area-inset-bottom) + 16px)', zIndex: 5000, background: 'var(--btn-bg)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)', border: '0.5px solid ' + borderColor, borderRadius: 28, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 10, boxShadow: '0 4px 20px rgba(0,0,0,0.10)', overflow: 'hidden', opacity: 1, transform: 'translateY(0) scale(1)', transition: 'opacity 180ms ease, transform 220ms cubic-bezier(0.34,1.56,0.64,1)', willChange: 'opacity, transform' } },
                        React.createElement('span', { style: { flexShrink: 0, fontSize: 16 } }, t === 'progress' ? React.createElement('span', { style: { width: 16, height: 16, border: '2px solid rgba(0,122,255,0.2)', borderTopColor: '#007aff', borderRadius: '50%', display: 'inline-block', animation: 'toastSpin 0.7s linear infinite', verticalAlign: 'middle' } }) : icon),
                        React.createElement('span', { style: { flex: 1, minWidth: 0, fontSize: 14, fontWeight: 500, color: 'var(--text-main)', lineHeight: 1.35 } }, txt)
                    );
                })()}
            </div>
        );
    };
    /* ---------- SettingsView ---------- */
    function SettingsView({ onClose, onOpenBackup }) {
        const [fontSize, setFontSize] = useState(() => localStorage.getItem('sj_fontsize') || 'medium');

        const applyFontSize = (size) => {
            const map = { small: '14px', medium: '16px', large: '19px' };
            document.documentElement.style.fontSize = map[size] || '16px';
            localStorage.setItem('sj_fontsize', size);
            setFontSize(size);
        };

        const sizeOptions = [
            { key: 'small', label: '小', fs: '0.8125rem' },
            { key: 'medium', label: '中', fs: '0.9375rem' },
            { key: 'large', label: '大', fs: '1.0625rem' },
        ];

        return (
            <div style={{ background: 'var(--primary-bg)', minHeight: '100vh' }}>
                {/* 返回按钮 — position:fixed 由 .editor-fab.left CSS 保证 */}
                <button className="editor-fab left" onClick={onClose}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>

                {/* compact 小标题 — 固定显示 */}
                <div className="page-title compact" style={{ visibility: 'visible', opacity: 1, pointerEvents: 'none' }}>设置</div>

                {/* 带滑入动画的内容区 */}
                <div style={{ animation: 'slideInFromRight 0.32s cubic-bezier(0.25,0.46,0.45,0.94) both' }}>
                <div style={{ padding: '126px 20px calc(40px + env(safe-area-inset-bottom))' }}>

                    {/* 外观 */}
                    <div className="section-header" style={{ paddingTop: 4 }}>外观</div>
                    <div className="list-group">
                        <div className="list-item" style={{ cursor: 'default' }}>
                            <div className="item-left">
                                <div className="item-title"><span className="item-title-text">文字大小</span></div>
                                <div className="item-meta">跟随浏览器缩放</div>
                            </div>
                            <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                                {sizeOptions.map(({ key, label, fs }) => (
                                    <button key={key} onClick={() => applyFontSize(key)} style={{
                                        height: 32, minWidth: 40, padding: '0 12px',
                                        borderRadius: 16,
                                        border: fontSize === key ? '0.5px solid rgba(0,122,255,0.35)' : '0.5px solid var(--border-color)',
                                        background: fontSize === key ? 'rgba(0,122,255,0.1)' : 'var(--btn-bg)',
                                        color: fontSize === key ? '#007aff' : 'var(--text-main)',
                                        fontSize: fs,
                                        fontWeight: fontSize === key ? 700 : 500,
                                        fontFamily: 'inherit',
                                        cursor: 'pointer',
                                        backdropFilter: 'blur(8px)',
                                        WebkitBackdropFilter: 'blur(8px)',
                                        transition: 'all 0.18s ease',
                                        lineHeight: 1,
                                    }}>
                                        {label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div style={{ height: 12 }} />

                    {/* 数据 */}
                    <div className="section-header" style={{ paddingTop: 4 }}>数据</div>
                    <div className="list-group">
                        <div className="list-item" onClick={onOpenBackup}>
                            <div className="item-left">
                                <div className="item-title"><span className="item-title-text">备份与恢复</span></div>
                                <div className="item-meta">Google Drive 云端同步</div>
                            </div>
                            <span style={{ color: 'var(--text-secondary)', fontSize: '1.125rem', opacity: 0.45, lineHeight: 1 }}>›</span>
                        </div>
                    </div>

                    <div style={{ height: 12 }} />

                    <div className="section-header" style={{ paddingTop: 4 }}>关于</div>
                    <div className="list-group">
                        <div className="list-item">
                            <div className="item-left"><div className="item-title">版本</div></div>
                            <span style={{ color: 'var(--text-secondary)', fontSize: '0.875rem' }}>2.0.0</span>
                        </div>
                        <div className="list-item">
                            <div className="item-left"><div className="item-title">联系我们</div></div>
                            <span style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>yanmiao822@gmail.com</span>
                        </div>
                    </div>

                    <div style={{ fontStyle: 'italic', fontSize: 12, color: 'var(--text-secondary)', textAlign: 'center', marginTop: 12, marginBottom: 4, opacity: 0.8 }}>此刻，值得被记住。</div>

                </div>
                </div>
            </div>
        );
    }

    /* ---------- MemoList ---------- */
    function MemoList() {
        const [memos, setMemos] = useState(() => {
            try {
                const saved = localStorage.getItem("memos_app_v2");
                const parsed = saved ? JSON.parse(saved) : [];
                return parsed.map(m => {
                    if (!m.doc && m.content !== undefined) {
                        return Object.assign({}, m, { doc: [{ id: genId(), type: "paragraph", children: [{ text: m.content || "" }] }], content: undefined, createdAt: m.createdAt || m.updatedAt || new Date().toISOString() });
                    }
                    if (!m.doc) return Object.assign({}, m, { doc: [{ id: genId(), type: "paragraph", children: [{ text: "" }] }], createdAt: m.createdAt || m.updatedAt || new Date().toISOString() });
                    if (!m.createdAt) m.createdAt = m.updatedAt || new Date().toISOString();
                    return m;
                });
            } catch { return []; }
        });
        const [editingMemoId, setEditingMemoId] = useState(null);
        const [newEditorAutoFocusId, setNewEditorAutoFocusId] = useState(null);
        const editingMemo = editingMemoId ? memos.find(m => m.id === editingMemoId) || null : null;
        const scrollRestoreRef = useRef(0);
        const [view, setView] = useState('list'); // 'list' | 'settings' | 'backup'

        const [scrollY, setScrollY] = useState(0);
        const TITLE_THRESHOLD = 30;

        const scrollTimerRef = useRef(null);
        const rafRef = useRef(null);
        useEffect(() => {
            const titleEl = document.querySelector('.page-title');
            const handleScroll = () => {
                if (rafRef.current) return;
                rafRef.current = requestAnimationFrame(() => {
                    rafRef.current = null;
                    setScrollY(Math.max(0, window.scrollY));
                    if (titleEl) titleEl.classList.add('scrolling');
                    clearTimeout(scrollTimerRef.current);
                    scrollTimerRef.current = setTimeout(() => { if (titleEl) titleEl.classList.remove('scrolling'); }, 200);
                });
            };
            window.addEventListener('scroll', handleScroll, { passive: true });
            return () => { window.removeEventListener('scroll', handleScroll); clearTimeout(scrollTimerRef.current); if (rafRef.current) cancelAnimationFrame(rafRef.current); };
        }, []);

        const shrinkProgress = Math.min(Math.max(scrollY / TITLE_THRESHOLD, 0), 1);
        const titleScale = 1 - shrinkProgress * 0.45;
        const titleTranslateY = shrinkProgress * -4;
        const titleOpacity = 1 - shrinkProgress * 0.3;
        const isCompact = shrinkProgress >= 1;

        useEffect(() => {
            try {
                const safe = memos.map(m => ({ ...m, doc: m.doc ? m.doc.map(n => { if (n.thumbDataUrl) { const { thumbDataUrl, ...rest } = n; return rest; } return n; }) : m.doc }));
                localStorage.setItem("memos_app_v2", JSON.stringify(safe));
            } catch (e) { }
        }, [memos]);

        const openEditor = (memo) => { if (memo.id === NEW_CARD_ID) { handleNew(); return; } scrollRestoreRef.current = window.scrollY; setEditingMemoId(memo.id); };
        const closeEditor = () => {
            const savedScroll = scrollRestoreRef.current;
            setEditingMemoId(null);
            setNewEditorAutoFocusId(null);
            if (savedScroll > 0) {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => { window.scrollTo(0, savedScroll); });
                });
            }
        };

        const handleNew = () => {
            const now = new Date().toISOString();
            const newMemo = { id: Date.now().toString(), title: "无标题", doc: [{ id: genId(), type: "paragraph", children: [{ text: "" }] }], pinned: false, createdAt: now, updatedAt: now };
            scrollRestoreRef.current = window.scrollY;
            setNewEditorAutoFocusId(newMemo.id);
            flushSync(() => {
                setMemos(ms => [newMemo, ...ms]);
                setEditingMemoId(newMemo.id);
            });
            const focusNow = () => {
                const firstBlock = document.querySelector('[data-type="paragraph"]');
                if (!firstBlock) return false;
                return focusEditableWithCaret(firstBlock, 0);
            };
            if (!focusNow()) {
                requestAnimationFrame(() => {
                    focusNow() || requestAnimationFrame(() => focusNow());
                });
            }
        };

        const togglePin = (id) => { if (id === NEW_CARD_ID) return; setMemos(ms => ms.map(m => m.id === id ? Object.assign({}, m, { pinned: !m.pinned, updatedAt: new Date().toISOString() }) : m)); };
        const deleteMemo = (id) => {
            if (id === NEW_CARD_ID) return;
            const target = memos.find(m => m.id === id);
            if (target && target.doc) {
                const fileIds = target.doc.filter(n => n.type === "attachment").map(n => n.fileId);
                if (fileIds.length > 0) { getDB().then(db => { fileIds.forEach(fid => deleteAttachmentFromDB(db, fid).catch(() => { })); }).catch(() => { }); }
            }
            setMemos(ms => ms.filter(m => m.id !== id));
            if (editingMemo && editingMemo.id === id) closeEditor();
        };
        const saveMemo = useCallback((id, changes) => setMemos(ms => ms.map(m => m.id === id ? Object.assign({}, m, changes) : m)), []);

        const newCardDoc = useMemo(() => [{ id: genId(), type: "paragraph", children: [{ text: "" }] }], []);

        const sorted = useMemo(() => { return [...memos].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.updatedAt) - new Date(a.updatedAt)); }, [memos]);

        const hasImageAttachment = useCallback((memo) => {
            return memo.doc && memo.doc.some(n => n.type === "attachment");
        }, []);

        const [expandedBlocks, setExpandedBlocks] = useState(() => new Set());
        const toggleBlock = useCallback((id) => {
            setExpandedBlocks(prev => {
                const next = new Set(prev);
                if (next.has(id)) next.delete(id); else next.add(id);
                return next;
            });
        }, []);

        const groupedItems = useMemo(() => {
            const groups = [];
            let pinnedImageMemos = [], pinnedTextMemos = [];
            let currentLabel = null, curImg = [], curTxt = [];
            sorted.forEach(memo => {
                if (memo.pinned) {
                    if (hasImageAttachment(memo)) pinnedImageMemos.push(memo); else pinnedTextMemos.push(memo);
                    return;
                }
                const label = getSectionLabel(memo.createdAt || memo.updatedAt);
                if (label !== currentLabel) {
                    if (currentLabel !== null && (curImg.length > 0 || curTxt.length > 0)) groups.push({ label: currentLabel, imageMemos: curImg, textMemos: curTxt });
                    currentLabel = label; curImg = []; curTxt = [];
                }
                if (hasImageAttachment(memo)) curImg.push(memo); else curTxt.push(memo);
            });
            if (currentLabel !== null && (curImg.length > 0 || curTxt.length > 0)) groups.push({ label: currentLabel, imageMemos: curImg, textMemos: curTxt });
            if (pinnedImageMemos.length > 0 || pinnedTextMemos.length > 0) groups.unshift({ label: "置顶", imageMemos: pinnedImageMemos, textMemos: pinnedTextMemos });
            return groups;
        }, [sorted, hasImageAttachment]);

        const isEditorOpen = !!editingMemo;

        if (view === 'backup') {
            return <BackupView onClose={() => setView('settings')} />;
        }
        if (view === 'settings') {
            return <SettingsView onClose={() => setView('list')} onOpenBackup={() => setView('backup')} />;
        }

        return (
            <>
                {!isEditorOpen && (
                    <div>
                        <header className="main-header"><div className="header-actions"></div></header>
                        <div className="page-title compact" style={{ visibility: isCompact ? 'visible' : 'hidden', opacity: isCompact ? 1 : 0, pointerEvents: 'auto', cursor: 'pointer', width: 'fit-content', margin: '0 auto' }} onClick={() => setView('settings')}>此刻</div>
                        <h1 className="page-title" style={{ transform: `scale(${titleScale}) translateY(${titleTranslateY}px)`, opacity: isCompact ? 0 : titleOpacity, visibility: isCompact ? 'hidden' : 'visible', transformOrigin: 'left center', pointerEvents: 'auto', cursor: 'pointer', display: 'inline-block', width: 'fit-content' }} onClick={() => setView('settings')}>此刻</h1>
                        <div className="container">
                            <div className="list-group">
                                <SwipeRow memo={{ id: NEW_CARD_ID, title: "新建笔记", doc: newCardDoc, pinned: true, createdAt: "", updatedAt: "", isVirtual: true }} onOpen={() => handleNew()} onPin={() => { }} onDelete={() => { }} />
                            </div>
                            {sorted.length === 0 ? <div className="empty-tip">暂无笔记，点击上方新建</div> : groupedItems.map((group, gi) => (
                                <div key={`group-${group.label}-${gi}`}>
                                    <div className="section-header">{group.label}</div>
                                    {group.imageMemos.length > 0 && (
                                        <div className="list-group">
                                            {group.imageMemos.length > 2 && !expandedBlocks.has(`${gi}-img`) ? (
                                                <div onClick={() => toggleBlock(`${gi}-img`)}>
                                                    <ImageCard memo={group.imageMemos[0]} onOpen={() => toggleBlock(`${gi}-img`)} onPin={togglePin} onDelete={deleteMemo} expandText={`▼ 展开 ${group.imageMemos.length} 条`} onExpand={() => toggleBlock(`${gi}-img`)} />
                                                </div>
                                            ) : (
                                                group.imageMemos.map((memo, mi) => (
                                                    <div key={memo.id} onClick={() => openEditor(memo)}>
                                                        <ImageCard memo={memo} onOpen={openEditor} onPin={togglePin} onDelete={deleteMemo} expandText={mi === group.imageMemos.length - 1 && group.imageMemos.length > 2 ? '▲ 收起' : undefined} onExpand={() => toggleBlock(`${gi}-img`)} />
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    )}
                                    {group.imageMemos.length > 0 && group.textMemos.length > 0 && <div className="gap-16" />}
                                    {group.textMemos.length > 0 && (
                                        <div className="list-group">
                                            {group.textMemos.length > 2 && !expandedBlocks.has(`${gi}-txt`) ? (
                                                <div onClick={() => toggleBlock(`${gi}-txt`)}>
                                                    <SwipeRow memo={group.textMemos[0]} onOpen={() => {}} onPin={togglePin} onDelete={deleteMemo} expandText={`▼ 展开 ${group.textMemos.length} 条`} onExpand={() => toggleBlock(`${gi}-txt`)} />
                                                </div>
                                            ) : (
                                                group.textMemos.map((memo, mi) => (
                                                    <div key={memo.id}>
                                                        <SwipeRow memo={memo} onOpen={() => openEditor(memo)} onPin={togglePin} onDelete={deleteMemo}
                                                            expandText={mi === group.textMemos.length - 1 && group.textMemos.length > 2 ? '▲ 收起' : undefined}
                                                            onExpand={() => toggleBlock(`${gi}-txt`)} />
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
                {editingMemo && <Editor memo={editingMemo} onClose={closeEditor} onSave={saveMemo} autoFocus={newEditorAutoFocusId === editingMemo.id} />}
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById("memo-list-root")).render(<MemoList />);
</script>

<script>
    (function () {
        if (("standalone" in window.navigator) && window.navigator.standalone) {
            document.addEventListener("click", function (e) {
                let nod = e.target;
                while (nod && nod.nodeName !== "A") nod = nod.parentNode;
                if (nod && "href" in nod && (nod.href.indexOf(window.location.host) !== -1 || nod.href.startsWith("/") || nod.href.startsWith("#"))) {
                    e.preventDefault();
                    window.location.href = nod.href;
                }
            }, false);
        }
    })();
</script>

</body>
</html>
