<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="此刻">

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">

    <title>此刻</title>

    <style>
        :root {
            --primary-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-secondary: #8e8e93;
            --card-bg: #f6f8fa;
            --btn-bg: rgba(240, 240, 242, 0.7); /* 提高透明度 */
            --border-color: rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-bg: #000000;
                --text-main: #ffffff;
                --text-secondary: #98989d;
                --card-bg: #1c1c1e;
                --btn-bg: rgba(44, 44, 46, 0.7);
                --border-color: rgba(255, 255, 255, 0.1);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- 优化 1：Header 仅作为按钮容器，不产生视觉隔断 --- */
        header {
            position: sticky;
            top: 0;
            z-index: 2000;
            padding-top: env(safe-area-inset-top);
            width: 100%;
            background: transparent;
            /* 关键：允许点击穿透到下方的标题 */
            pointer-events: none; 
        }

        .header-actions {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 16px;
            gap: 12px;
            /* 关键：恢复按钮自身的点击 */
            pointer-events: auto; 
        }

        .action-btn {
            background: var(--btn-bg);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            /* 极简风模糊 */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            /* 减弱阴影，减少突兀感 */
            border: 0.5px solid var(--border-color);
        }

        /* --- 优化 2：标题负边距向上冲，实现“此刻”在大刘海区域浮现 --- */
        .page-title {
            position: relative;
            z-index: 1000;
            /* 移除过大的 margin，让它自然上浮 */
            padding: 4px 20px 10px 20px;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
            /* 关键：标题文字不响应点击，防止挡住按钮操作 */
            pointer-events: none; 
            /* 视觉减弱：让重叠部分看起来像艺术水印 */
            opacity: 0.9;
        }

        .container {
            padding: 12px 16px;
            position: relative;
            z-index: 1;
        }

        .list-group {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .list-item {
            padding: 16px;
            border-bottom: 0.5px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
        }

        .list-item:last-child { border-bottom: none; }

        .item-count { color: var(--text-secondary); font-size: 15px; }

        footer { text-align: center; padding: 40px 0; color: var(--text-secondary); font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="header-actions">
            <div class="action-btn">📁⁺</div>
            <a href="index.html" class="action-btn" id="admin-btn">管理</a>
        </div>
    </header>

    <h1 class="page-title">此刻</h1>

    <div class="container">
        <div class="list-group">
            <a href="#" class="list-item">
                <span>全部笔记</span>
                <span class="item-count">12</span>
            </a>
            <a href="#" class="list-item">
                <span>今日感悟</span>
                <span class="item-count">3</span>
            </a>
        </div>
        
        <div style="height: 1000px; padding-top: 20px; color: var(--text-secondary);">
            滑动感受文字穿梭于按钮后的通透感...
        </div>
    </div>

    <script>
        (function() {
            if (("standalone" in window.navigator) && window.navigator.standalone) {
                document.addEventListener("click", function(e) {
                    let nod = e.target;
                    while (nod && nod.nodeName !== "A") nod = nod.parentNode;
                    if (nod && "href" in nod && (nod.href.indexOf(window.location.host) !== -1 || nod.href.startsWith("/") || nod.href.startsWith("#"))) {
                        e.preventDefault();
                        window.location.href = nod.href;
                    }
                }, false);
            }
        })();
    </script>
</body>
</html>
