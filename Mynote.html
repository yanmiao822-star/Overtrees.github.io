<script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const genId = () => Math.random().toString(36).slice(2, 10);
    function timeAgo(iso) {
        if (!iso) return "现在";
        const diff = Date.now() - new Date(iso).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 1) return "刚刚";
        if (m < 60) return `${m} 分钟前`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h} 小时前`;
        const d = new Date(iso);
        const now = new Date();
        if (d.getFullYear() === now.getFullYear())
            return `${d.getMonth()+1}/${d.getDate()}`;
        return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    }

    const NEW_CARD_ID = "__new_memo_card__";

    /* ---------- DB 单例 ---------- */
    let _dbInstance = null;
    function getDB() {
        if (_dbInstance) return Promise.resolve(_dbInstance);
        return openDB().then(db => { _dbInstance = db; return db; });
    }

    function getSectionLabel(dateStr) {
        const now = new Date();
        const date = new Date(dateStr);
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today.getTime() - 86400000);
        const sevenDaysAgo = new Date(today.getTime() - 7 * 86400000);
        const thirtyDaysAgo = new Date(today.getTime() - 30 * 86400000);

        if (date >= today) return "今天";
        if (date >= yesterday) return "昨天";
        if (date >= sevenDaysAgo) return "过去7天";
        if (date >= thirtyDaysAgo) return "过去30天";
        if (date.getFullYear() === now.getFullYear()) {
            return `${date.getMonth() + 1}月`;
        }
        return `${date.getFullYear()}年`;
    }

    /* ---------- IndexedDB ---------- */
    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('MemosDB', 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('attachments')) {
                    db.createObjectStore('attachments', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('avatars')) {
                    db.createObjectStore('avatars', { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }
    async function saveAttachmentToDB(db, obj) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('attachments', 'readwrite');
            tx.objectStore('attachments').put(obj);
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e.target.error);
        });
    }
    async function loadAttachmentFromDB(db, id) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('attachments', 'readonly');
            const req = tx.objectStore('attachments').get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = (e) => reject(e.target.error);
        });
    }
    async function deleteAttachmentFromDB(db, id) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('attachments', 'readwrite');
            tx.objectStore('attachments').delete(id);
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveAvatarToDB(db, memoId, dataUrl) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('avatars', 'readwrite');
            tx.objectStore('avatars').put({ id: memoId, dataUrl });
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e.target.error);
        });
    }
    async function loadAvatarFromDB(db, memoId) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('avatars', 'readonly');
            const req = tx.objectStore('avatars').get(memoId);
            req.onsuccess = () => resolve(req.result ? req.result.dataUrl : null);
            req.onerror = (e) => reject(e.target.error);
        });
    }

    function createThumbnail(dataUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const size = 200;
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                const side = Math.min(img.width, img.height);
                const sx = (img.width - side) / 2;
                const sy = (img.height - side) / 2;
                ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
                resolve(canvas.toDataURL('image/jpeg', 0.92));
            };
            img.src = dataUrl;
        });
    }

    /* ---------- SwipeRow ---------- */
    function SwipeRow({ memo, onOpen, onPin, onDelete }) {
        const rowRef = useRef(null);
        const startXRef = useRef(null);
        const startYRef = useRef(null);
        const currentXRef = useRef(0);
        const openedRef = useRef(false);
        const swipingRef = useRef(false);
        const ACTION_W = 140, THRESHOLD = 55, MIN_DX = 5;
        const [thumb, setThumb] = useState(null);
        const isNewCard = memo.id === NEW_CARD_ID;

        const setTranslate = (x) => { if (rowRef.current) rowRef.current.style.transform = `translateX(${x}px)`; };
        const snapOpen  = () => { setTranslate(-ACTION_W); openedRef.current = true;  currentXRef.current = -ACTION_W; };
        const snapClose = () => { setTranslate(0); openedRef.current = false; currentXRef.current = 0; swipingRef.current = false; };

        const onTouchStart = (e) => {
            if (isNewCard) return;
            startXRef.current = e.touches[0].clientX;
            startYRef.current = e.touches[0].clientY;
            swipingRef.current = false;
            if (rowRef.current) rowRef.current.style.transition = "none";
        };
        const onTouchMove = (e) => {
            if (isNewCard || startXRef.current === null) return;
            const dx = e.touches[0].clientX - startXRef.current;
            const dy = e.touches[0].clientY - startYRef.current;
            if (!swipingRef.current && Math.abs(dy) > Math.abs(dx) + 8) {
                snapClose(); startXRef.current = null; return;
            }
            if (!swipingRef.current && Math.abs(dx) > MIN_DX) swipingRef.current = true;
            if (!swipingRef.current) return;
            e.preventDefault();
            const base = openedRef.current ? -ACTION_W : 0;
            const next = Math.min(0, Math.max(-ACTION_W, base + dx));
            setTranslate(next);
            currentXRef.current = next;
        };
        const onTouchEnd = () => {
            if (isNewCard) return;
            if (rowRef.current) rowRef.current.style.transition = "transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)";
            if (openedRef.current) {
                currentXRef.current > -ACTION_W + THRESHOLD ? snapClose() : snapOpen();
            } else {
                currentXRef.current < -THRESHOLD ? snapOpen() : snapClose();
            }
            startXRef.current = null;
        };

        useEffect(() => {
            if (isNewCard) return;
            setThumb(null);
            const firstAttach = memo.doc && memo.doc.find(n => n.type === "attachment");
            if (!firstAttach) return;
            if (firstAttach.thumbDataUrl) {
                setThumb(firstAttach.thumbDataUrl);
                return;
            }
            let cancelled = false;
            (async () => {
                try {
                    const db = await getDB();
                    for (let attempt = 0; attempt < 5; attempt++) {
                        if (cancelled) return;
                        const stored = await loadAttachmentFromDB(db, firstAttach.fileId).catch(() => null);
                        if (!stored) break;
                        if (stored.type && stored.type.startsWith("image/") && stored.thumb) {
                            if (!cancelled) setThumb(stored.thumb);
                            return;
                        }
                        await new Promise(r => setTimeout(r, 300));
                    }
                } catch(e) {}
            })();
            return () => { cancelled = true; };
        }, [memo.id, memo.doc]);

        let preview = "无更多文本";
        if (memo.doc) {
            const firstPara = memo.doc.find(n => n.type === "paragraph");
            if (firstPara && firstPara.children && firstPara.children[0]) {
                preview = (firstPara.children[0].text || "").replace(/\n/g, " ") || "无更多文本";
            }
        }

        return (
            <div className="swipe-wrapper">
                {!isNewCard && (
                    <div className="swipe-actions">
                        <button className="swipe-action-btn" style={{ background: "#4A90D9" }}
                            onClick={e => { e.stopPropagation(); snapClose(); onPin(memo.id); }}>
                            <span>📌</span>{memo.pinned ? "取消置顶" : "置顶"}
                        </button>
                        <button className="swipe-action-btn" style={{ background: "#E0433A" }}
                            onClick={e => { e.stopPropagation(); snapClose(); onDelete(memo.id); }}>
                            <span>🗑️</span>删除
                        </button>
                    </div>
                )}
                <div ref={rowRef} className="list-item" onClick={() => openedRef.current && !isNewCard ? snapClose() : onOpen(memo)}
                    onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                    <div className="item-left">
                        <div className={`item-title${isNewCard ? ' new-card-title' : ''}`}>
                            {!isNewCard && memo.pinned && <span className="pin-dot" />}
                            {isNewCard ? "新建笔记" : (memo.title || "无标题")}
                        </div>
                        <div className="item-meta">
                            {isNewCard ? "现在" : timeAgo(memo.updatedAt)}&nbsp;&nbsp;{isNewCard ? "点击记录你的瞬间" : preview}
                        </div>
                    </div>
                    {!isNewCard && thumb && <img className="item-thumb" src={thumb} alt="" />}
                </div>
            </div>
        );
    }

    /* ---------- LazyImage ---------- */
    function LazyImage({ file }) {
        const [phase, setPhase] = useState("skeleton");
        const [fullLoaded, setFullLoaded] = useState(false);
        const elRef = useRef(null);

        useEffect(() => {
            const el = elRef.current;
            if (!el) return;
            const observer = new IntersectionObserver(
                ([entry]) => {
                    if (entry.isIntersecting) {
                        setPhase("thumb");
                        observer.unobserve(el);
                    }
                },
                { rootMargin: "100px" }
            );
            observer.observe(el);
            return () => observer.disconnect();
        }, []);

        const handleFullLoad = () => {
            setFullLoaded(true);
            if (file.thumb && file.thumb.startsWith("blob:")) {
                URL.revokeObjectURL(file.thumb);
            }
        };

        if (phase === "skeleton") {
            return <div ref={elRef} className="attachment-placeholder" />;
        }

        return (
            <div className="lazy-img-wrapper">
                <img src={file.thumb || file.url} alt={file.name} className="lazy-img-thumb" />
                <img src={file.url} alt={file.name} className={`lazy-img-full ${fullLoaded ? "loaded" : ""}`} onLoad={handleFullLoad} loading="lazy" />
            </div>
        );
    }

    /* ---------- Editor ---------- */
    function Editor({ memo, onClose, onSave }) {

            onSave(memo.id, { title: titleValueRef.current.trim() || "无标题", doc: d, updatedAt: new Date().toISOString() });
        }, [memo.id, onSave]);

        const triggerAutoSave = useCallback(() => {
            clearTimeout(saveTimer.current);
            saveTimer.current = setTimeout(() => doSave(docRef.current), 600);
        }, [doSave]);

        useEffect(() => {
            triggerAutoSave();
            return () => clearTimeout(saveTimer.current);
        }, [title, triggerAutoSave]);

        const handleClose = async () => {
            clearTimeout(saveTimer.current);
            const pending = Object.values(pendingAttachmentsRef.current);
            if (pending.length > 0) {
                await Promise.allSettled(pending);
            }
            doSave(docRef.current);
            onClose();
        };

        const handleAvatarSelected = async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const dataUrl = ev.target.result;
                setAvatarUrl(dataUrl);
                if (dbRef.current) {
                    await saveAvatarToDB(dbRef.current, memo.id, dataUrl).catch(() => {});
                }
            };
            reader.readAsDataURL(file);
            e.target.value = "";
        };

        const recordOp = useCallback((patch) => {
            txOps.current.push(patch);
            clearTimeout(txTimer.current);
            txTimer.current = setTimeout(() => {
                const combined = txOps.current;
                txOps.current = [];
                if (combined.length === 0) return;

                const inverse = combined.map(p => {
                    if (p.op === "update") return { op: "update", index: p.index, prev: p.next, next: p.prev };
                    if (p.op === "insert") return { op: "remove", index: p.index, node: p.node };
                    if (p.op === "remove") return { op: "insert", index: p.index, node: p.node };
                    return p;
                }).reverse();

                history.current.past.push({ patch: combined, inverse });
                if (history.current.past.length > 100) history.current.past.shift();
                history.current.future = [];
            }, 400);
        }, []);

        const applyPatch = useCallback((patch) => {
            const cur = docRef.current;
            patch.forEach(p => {
                if (p.op === "update") cur[p.index] = p.next || p.prev;
                else if (p.op === "insert") cur.splice(p.index, 0, p.node);
                else if (p.op === "remove") cur.splice(p.index, 1);
            });
            setRenderKey(prev => prev + 1);
        }, []);

        const undo = useCallback(() => {
            const last = history.current.past.pop();
            if (!last) return;
            applyPatch(last.inverse);
            history.current.future.push(last);
            triggerAutoSave();
        }, [applyPatch, triggerAutoSave]);

        const redo = useCallback(() => {
            const next = history.current.future.pop();
            if (!next) return;
            applyPatch(next.patch);
            history.current.past.push(next);
            triggerAutoSave();
        }, [applyPatch, triggerAutoSave]);

        useEffect(() => {
            const handler = (e) => {
                if (e.key === "z" && (e.metaKey || e.ctrlKey)) {
                    e.preventDefault();
                    if (e.shiftKey) redo();
                    else undo();
                }
            };
            window.addEventListener("keydown", handler);
            return () => window.removeEventListener("keydown", handler);
        }, [undo, redo]);

        function readSelectionFromDOM(rootEl) {
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return null;
            const range = sel.getRangeAt(0);
            let node = range.startContainer;
            while (node && node !== rootEl && !(node.dataset && node.dataset.blockid)) {
                node = node.parentNode;
            }
            if (!node || !node.dataset) return null;
            const blockId = node.dataset.blockid;
            const blockIndex = docRef.current.findIndex(n => n.id === blockId);
            if (blockIndex === -1) return null;
            return { blockIndex, blockId, offset: range.startOffset };
        }

        function restoreSelection(rootEl, sel) {
            if (!sel) return;
            let block = null;
            if (sel.blockId) {
                block = rootEl.querySelector(`[data-blockid="${sel.blockId}"]`);
            }
            if (!block) {
                const paragraphs = rootEl.querySelectorAll('[data-type="paragraph"]');
                block = paragraphs[sel.blockIndex];
            }
            if (!block) return;
            const range = document.createRange();
            const textNode = block.firstChild;
            if (textNode) {
                range.setStart(textNode, Math.min(sel.offset, textNode.textContent.length));
            } else {
                range.setStart(block, 0);
            }
            range.collapse(true);
            const s = window.getSelection();
            s.removeAllRanges();
            s.addRange(range);
            block.focus();
        }

        const splitParagraphAtSelection = useCallback(() => {
            const sel = selectionRef.current;
            if (!sel) return;
            const doc = docRef.current;
            const block = doc[sel.blockIndex];
            if (!block || block.type !== "paragraph") return;
            const text = (block.children[0] && block.children[0].text) || "";
            const before = text.slice(0, sel.offset);
            const after = text.slice(sel.offset);
            const newId = genId();
            const oldBlock = Object.assign({}, block, { children: [{ text: before }] });
            const newBlock = { id: newId, type: "paragraph", children: [{ text: after }] };

            recordOp({ op: "update", index: sel.blockIndex, prev: block, next: oldBlock });
            recordOp({ op: "insert", index: sel.blockIndex + 1, node: newBlock });

            doc[sel.blockIndex] = oldBlock;
            doc.splice(sel.blockIndex + 1, 0, newBlock);
            setRenderKey(prev => prev + 1);
            selectionRef.current = { blockIndex: sel.blockIndex + 1, blockId: newId, offset: 0 };
        }, [recordOp]);

        const insertAttachmentAtCursor = useCallback(async (file) => {
            const id = genId();
            const doc = docRef.current;
            let insertIdx;

            if (selectionRef.current) {
                if (selectionRef.current.offset > 0) {
                    const block = doc[selectionRef.current.blockIndex];
                    if (block.type === "paragraph") {
                        const text = block.children[0].text;
                        const before = text.slice(0, selectionRef.current.offset);
                        const after = text.slice(selectionRef.current.offset);
                        const oldBlock = Object.assign({}, block, { children: [{ text: before }] });
                        const newPara = { id: genId(), type: "paragraph", children: [{ text: after }] };

                        recordOp({ op: "update", index: selectionRef.current.blockIndex, prev: block, next: oldBlock });
                        recordOp({ op: "insert", index: selectionRef.current.blockIndex + 1, node: newPara });

                        doc[selectionRef.current.blockIndex] = oldBlock;
                        doc.splice(selectionRef.current.blockIndex + 1, 0, newPara);
                        insertIdx = selectionRef.current.blockIndex + 1;
                    }
                } else {
                    insertIdx = selectionRef.current.blockIndex;
                }
            } else {
                insertIdx = doc.length;
            }

            const attachmentNode = { id: genId(), type: "attachment", fileId: id, status: "loading" };
            const newPara = { id: genId(), type: "paragraph", children: [{ text: "" }] };

            if (insertIdx !== undefined) {
                recordOp({ op: "insert", index: insertIdx, node: attachmentNode });
                recordOp({ op: "insert", index: insertIdx + 1, node: newPara });
                doc.splice(insertIdx, 0, attachmentNode, newPara);
            } else {
                recordOp({ op: "insert", index: doc.length, node: attachmentNode });
                recordOp({ op: "insert", index: doc.length + 1, node: newPara });
                doc.push(attachmentNode, newPara);
            }

            setRenderKey(prev => prev + 1);
            selectionRef.current = { blockIndex: doc.findIndex(n => n.id === newPara.id), offset: 0 };

            const url = URL.createObjectURL(file);
            setFiles(prev => (Object.assign({}, prev, { [id]: { name: file.name, type: file.type, url, size: file.size, thumb: null } })));

            const reader = new FileReader();
            const savePromise = new Promise((resolveAttach) => {
                reader.onload = async (ev) => {
                    try {
                        const dataUrl = ev.target.result;
                        const isImg = file.type.startsWith("image/");
                        const thumb = isImg ? await createThumbnail(dataUrl) : null;
                        await saveAttachmentToDB(dbRef.current, {
                            id,
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            url: dataUrl,
                            thumb
                        });
                        if (thumb) {
                            const attachIdx = docRef.current.findIndex(n => n.type === "attachment" && n.fileId === id);
                            if (attachIdx !== -1) {
                                docRef.current[attachIdx] = Object.assign({}, docRef.current[attachIdx], { thumbDataUrl: thumb, status: "done" });
                            }
                        }
                        setFiles(prev => (Object.assign({}, prev, { [id]: Object.assign({}, prev[id], { thumb, url: dataUrl }) })));
                    } catch (err) {
                        console.error("附件保存失败", err);
                    } finally {
                        delete pendingAttachmentsRef.current[id];
                        resolveAttach();
                    }
                };
            });
            pendingAttachmentsRef.current[id] = savePromise;
            reader.readAsDataURL(file);
        }, [recordOp]);

        const handleAddAttachment = () => {
            setShowMenu(false);
            if (fileInputRef.current) fileInputRef.current.click();
        };

        const handleFilesSelected = async (e) => {
            const filesArr = Array.from(e.target.files);
            e.target.value = '';
            if (!filesArr.length) return;
            if (!dbRef.current) {
                try {
                    dbRef.current = await getDB();
                } catch(err) {
                    console.error("DB 初始化失败，无法添加附件", err);
                    return;
                }
            }
            for (const file of filesArr) {
                await insertAttachmentAtCursor(file);
            }
        };

        const handleParagraphInput = (e, nodeId) => {
            const sel = readSelectionFromDOM(editorRef.current);
            if (sel) selectionRef.current = sel;
            const text = e.currentTarget.textContent;
            const doc = docRef.current;
            const index = doc.findIndex(n => n.id === nodeId);
            if (index === -1) return;
            const oldBlock = doc[index];
            const newBlock = Object.assign({}, oldBlock, { children: [{ text }] });
            doc[index] = newBlock;
            triggerAutoSave();
        };

        const handleParagraphKeyDown = (e, nodeId) => {
            const isEnter = e.key === "Enter" || e.keyCode === 13 || e.which === 13;
            if (isEnter && !isComposingRef.current) {
                e.preventDefault();
                setFakeCursorId(null);
                let sel = readSelectionFromDOM(editorRef.current);
                if (!sel) {
                    const fallbackIdx = docRef.current.findIndex(n => n.id === nodeId);
                    if (fallbackIdx !== -1) {
                        const curText = docRef.current[fallbackIdx].children[0] ? docRef.current[fallbackIdx].children[0].text : "";
                        sel = { blockIndex: fallbackIdx, blockId: nodeId, offset: curText.length };
                    }
                }
                if (sel) {
                    selectionRef.current = sel;
                    splitParagraphAtSelection();
                }
                triggerAutoSave();
                return;
            }
            if (e.key === "Backspace") {
                const sel = window.getSelection();
                const doc = docRef.current;
                const idx = doc.findIndex(n => n.id === nodeId);
                const curBlock = idx !== -1 ? doc[idx] : null;
                const curText = curBlock && curBlock.children[0] ? curBlock.children[0].text : "";
                const isEmpty = curText === "";
                const atStart = isEmpty || (sel && sel.rangeCount > 0 && sel.getRangeAt(0).startOffset === 0 && sel.getRangeAt(0).collapsed);
                if (!atStart) { setFakeCursorId(null); return; }
                if (idx > 0 && doc[idx - 1].type === "attachment") {
                    e.preventDefault();
                    setFakeCursorId(null);
                    const attachNode = doc[idx - 1];
                    removeAttachment(attachNode.id, attachNode.fileId);
                    triggerAutoSave();
                } else if (idx > 0 && doc[idx - 1].type === "paragraph") {
                    e.preventDefault();
                    setFakeCursorId(null);
                    const curBlock = doc[idx];
                    const prevBlock = doc[idx - 1];
                    const curText = curBlock.children[0] ? curBlock.children[0].text : "";
                    const prevText = prevBlock.children[0] ? prevBlock.children[0].text : "";
                    const mergedOffset = prevText.length;
                    const mergedBlock = Object.assign({}, prevBlock, { children: [{ text: prevText + curText }] });
                    recordOp({ op: "update", index: idx - 1, prev: prevBlock, next: mergedBlock });
                    recordOp({ op: "remove", index: idx, node: curBlock });
                    doc[idx - 1] = mergedBlock;
                    doc.splice(idx, 1);
                    selectionRef.current = { blockIndex: idx - 1, blockId: prevBlock.id, offset: mergedOffset };
                    setRenderKey(prev => prev + 1);
                    triggerAutoSave();
                }
            }
        };

        const resizeObserverRef = useRef(null);
        useEffect(() => {
            const observer = new ResizeObserver(entries => {
                entries.forEach(entry => {
                    const id = entry.target.dataset.blockid;
                    if (id) heightMap.current[id] = entry.target.offsetHeight;
                });
            });
            resizeObserverRef.current = observer;

            const observeBlocks = () => {
                if (!editorRef.current) return;
                editorRef.current.querySelectorAll('[data-blockid]').forEach(b => observer.observe(b));
            };
            observeBlocks();

            const mutationObserver = new MutationObserver(observeBlocks);
            if (editorRef.current) {
                mutationObserver.observe(editorRef.current, { childList: true, subtree: true });
            }
            return () => {
                observer.disconnect();
                mutationObserver.disconnect();
            };
        }, []);

        const calcVisibleRange = useCallback(() => {
            const el = virtRef.current;
            if (!el) return;
            const scrollTop = window.scrollY || el.scrollTop;
            const clientHeight = window.innerHeight;
            const doc = docRef.current;
            const total = doc.length;
            if (total <= VIRT_THRESHOLD) {
                setVisibleRange([0, total]);
                return;
            }

            let cumulative = 0;
            let start = 0;
            let end = total;
            for (let i = 0; i < total; i++) {
                const node = doc[i];
                const h = heightMap.current[node.id] || 60;
                cumulative += h;
                if (cumulative < scrollTop) start = i + 1;
                if (cumulative < scrollTop + clientHeight + 200) end = i + 1;
                else break;
            }
            start = Math.max(0, start - 2);
            end = Math.min(total, end + 2);
            setVisibleRange([start, end]);
        }, []);

        useEffect(() => {
            const handler = () => calcVisibleRange();
            window.addEventListener("scroll", handler, { passive: true });
            window.addEventListener("resize", handler);
            calcVisibleRange();
            return () => {
                window.removeEventListener("scroll", handler);
                window.removeEventListener("resize", handler);
            };
        }, [calcVisibleRange]);

        useEffect(() => {
            if (editorRef.current && selectionRef.current) {
                const id = setTimeout(() => {
                    restoreSelection(editorRef.current, selectionRef.current);
                    selectionRef.current = null;
                }, 0);
                return () => clearTimeout(id);
            }
        }, [renderKey]);

        const removeAttachment = useCallback(async (nodeId, fileId) => {
            const file = files[fileId];
            if (file) {
                if (file.url && file.url.startsWith('blob:')) URL.revokeObjectURL(file.url);
                if (file.thumb && file.thumb.startsWith('blob:')) URL.revokeObjectURL(file.thumb);
            }
            if (dbRef.current) await deleteAttachmentFromDB(dbRef.current, fileId).catch(() => {});
            const doc = docRef.current;
            const idx = doc.findIndex(n => n.type === "attachment" && n.fileId === fileId);
            if (idx !== -1) {
                recordOp({ op: "remove", index: idx, node: doc[idx] });
                doc.splice(idx, 1);
                setRenderKey(prev => prev + 1);
            }
            setFiles(prev => { const n = Object.assign({}, prev); delete n[fileId]; return n; });
        }, [files, recordOp]);

        const onDragStart = (e, nodeId) => {
            dragState.current.draggingId = nodeId;
            e.dataTransfer.effectAllowed = "move";
            e.currentTarget.classList.add("dragging");
        };
        const onDragEnd = (e) => {
            e.currentTarget.classList.remove("dragging");
            const { draggingId, overIndex } = dragState.current;
            if (draggingId && overIndex !== null) {
                const doc = docRef.current;
                const fromIdx = doc.findIndex(n => n.id === draggingId);
                if (fromIdx !== -1 && fromIdx !== overIndex) {
                    const [item] = doc.splice(fromIdx, 1);
                    const adjustIndex = overIndex > fromIdx ? overIndex - 1 : overIndex;
                    doc.splice(adjustIndex, 0, item);

                    recordOp({ op: "remove", index: fromIdx, node: item });
                    recordOp({ op: "insert", index: adjustIndex, node: item });
                    setRenderKey(prev => prev + 1);
                }
            }
            dragState.current = { draggingId: null, overIndex: null };
            setDragOverIndex(null);
        };
        const onDragOver = (e, index) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            const y = e.clientY;
            const threshold = 80;
            if (y < threshold) window.scrollBy(0, -10);
            else if (window.innerHeight - y < threshold) window.scrollBy(0, 10);
            dragState.current.overIndex = index;
            setDragOverIndex(index);
        };

        const doc = docRef.current;
        const useVirtual = doc.length > VIRT_THRESHOLD;
        const [start, end] = visibleRange;
        const visibleDoc = useVirtual ? doc.slice(start, end) : doc;
        const totalHeight = useVirtual ? (Object.values(heightMap.current).reduce((a, b) => a + b, 0) || doc.length * 60) : 'auto';
        const offsetTop = useVirtual ? doc.slice(0, start).reduce((acc, n) => acc + (heightMap.current[n.id] || 60), 0) : 0;

        const charCount = doc.reduce((acc, n) => n.type === "paragraph" ? acc + (n.children[0] ? n.children[0].text : "").replace(/\n/g, "").length : acc, 0);

        return (
            <div style={{ background: "var(--primary-bg)", minHeight: "100vh", animation: "slideUp 0.28s cubic-bezier(0.32,0.72,0,1)" }}>
                {/* 返回按钮：fixed 悬浮 */}
                <button className="editor-fab left" onClick={handleClose}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>

                {/* 头像按钮：fixed 居中悬浮 */}
                <button
                    onClick={() => avatarInputRef.current && avatarInputRef.current.click()}
                    style={{
                        position: "fixed",
                        zIndex: 3001,
                        top: "calc(env(safe-area-inset-top) + 7px)",
                        left: "50%",
                        transform: "translateX(-50%)",
                        width: 66,
                        height: 66,
                        borderRadius: "50%",
                        border: "0.5px solid var(--border-color)",
                        background: avatarUrl ? "transparent" : "var(--btn-bg)",
                        backdropFilter: avatarUrl ? "none" : "blur(8px)",
                        WebkitBackdropFilter: avatarUrl ? "none" : "blur(8px)",
                        cursor: "pointer",
                        padding: 0,
                        overflow: "hidden",
                    }}
                >
                    {avatarUrl ? (
                        <img src={avatarUrl} alt="avatar" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", imageRendering: "auto", WebkitBackfaceVisibility: "hidden" }} />
                    ) : (
                        <span style={{ fontSize: 26 }}>👽</span>
                    )}
                </button>
                <input ref={avatarInputRef} type="file" accept="image/*" onChange={handleAvatarSelected} style={{ display: "none" }} />

                {/* 标题+时间字数胶囊：fixed，头像正下方，标题直接可编辑 */}
                <div
                    style={{
                        position: "fixed",
                        zIndex: 3001,
                        top: "calc(env(safe-area-inset-top) + 7px + 66px + 6px)",
                        left: "50%",
                        transform: "translateX(-50%)",
                        background: "var(--btn-bg)",
                        backdropFilter: "blur(8px)",
                        WebkitBackdropFilter: "blur(8px)",
                        border: "0.5px solid var(--border-color)",
                        borderRadius: 20,
                        padding: "5px 16px 6px",
                        display: "flex",
                        flexDirection: "column",
                        alignItems: "center",
                        gap: 1,
                        minWidth: 120,
                        maxWidth: "60vw",
                        whiteSpace: "nowrap",
                        overflow: "hidden",
                    }}
                >
                    <div
                        contentEditable
                        suppressContentEditableWarning
                        ref={el => {
                            if (el && !isEditingTitleRef.current && el.textContent !== title) {
                                el.textContent = title || "无标题";
                            }
                        }}
                        onFocus={() => { isEditingTitleRef.current = true; }}
                        onBlur={e => {
                            isEditingTitleRef.current = false;
                            const raw = e.currentTarget.textContent.trim();
                            const clamped = raw.slice(0, 50) || "无标题";
                            if (e.currentTarget.textContent !== clamped) e.currentTarget.textContent = clamped;
                            setTitle(clamped);
                        }}
                        onInput={e => {
                            if (e.currentTarget.textContent.length > 50) {
                                e.currentTarget.textContent = e.currentTarget.textContent.slice(0, 50);
                                const sel = window.getSelection();
                                if (sel && e.currentTarget.firstChild) {
                                    const range = document.createRange();
                                    range.setStart(e.currentTarget.firstChild, 50);
                                    range.collapse(true);
                                    sel.removeAllRanges();
                                    sel.addRange(range);
                                }
                            }
                        }}
                        onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
                        style={{ fontSize: 15, fontWeight: 600, color: "var(--text-main)", whiteSpace: "nowrap", maxWidth: "100%", letterSpacing: "-0.3px", outline: "none", minWidth: 40, cursor: "text" }}
                    />
                    <div style={{ fontSize: 11, color: "var(--text-secondary)", letterSpacing: 0, pointerEvents: "none" }}>
                        {timeAgo(memo.updatedAt)} · {charCount} 字
                    </div>
                </div>

                {/* 更多按钮：fixed 悬浮 */}
                <button className="editor-fab right" onClick={() => setShowMenu(!showMenu)}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <circle cx="5" cy="12" r="2" />
                        <circle cx="12" cy="12" r="2" />
                        <circle cx="19" cy="12" r="2" />
                    </svg>
                </button>

                {/* 弹出菜单：与更多按钮同款毛玻璃胶囊样式 */}
                {showMenu && (
                    <div style={{
                        position: "fixed",
                        zIndex: 3002,
                        right: 16,
                        top: "calc(env(safe-area-inset-top) + 7px + 46px + 6px)",
                        background: "var(--btn-bg)",
                        backdropFilter: "blur(8px)",
                        WebkitBackdropFilter: "blur(8px)",
                        border: "0.5px solid var(--border-color)",
                        borderRadius: 20,
                        boxShadow: "0 4px 12px rgba(0,0,0,0.08)",
                        overflow: "hidden",
                        minWidth: 120,
                    }}>
                        <button onClick={handleAddAttachment} style={{ width: "100%", padding: "10px 16px", border: "none", background: "none", color: "var(--text-main)", fontSize: 14, cursor: "pointer", textAlign: "left" }}>📎 添加附件</button>
                    </div>
                )}

                {/* 透明 header，仅用于顶部占位 */}
                <header style={{ background: "transparent", pointerEvents: "none" }}>
                    <div style={{ height: 44 }}></div>
                </header>

                <div ref={editorRef} style={{ paddingLeft: 20, paddingRight: 20, paddingTop: "calc(66px + 44px + 6px)", paddingBottom: "calc(env(safe-area-inset-bottom) + 40px)" }}>

                    <div className="virtual-scroll" ref={virtRef} style={{ height: useVirtual ? totalHeight : 'auto', position: 'relative' }}>
                        <div style={{ paddingTop: useVirtual ? offsetTop : 0 }}>
                            {visibleDoc.map((node, index) => {
                                const realIndex = useVirtual ? start + index : index;
                                if (node.type === "paragraph") {
                                    return (
                                        <div key={node.id} className="block" draggable
                                             onDragStart={(e) => onDragStart(e, node.id)}
                                             onDragEnd={onDragEnd}
                                             onDragOver={(e) => onDragOver(e, realIndex)}
                                             style={{ marginBottom: 4 }}
                                        >
                                            {dragOverIndex === realIndex && <div className="drop-indicator" />}
                                            <div
                                                data-type="paragraph"
                                                data-blockid={node.id}
                                                contentEditable
                                                suppressContentEditableWarning
                                                ref={el => {
                                                    if (el && !editingBlocksRef.current.has(node.id)) {
                                                        const expected = (node.children[0] && node.children[0].text) || "";
                                                        if (el.textContent !== expected) {
                                                            el.textContent = expected;
                                                        }
                                                    }
                                                }}
                                                onFocus={() => {
                                                    editingBlocksRef.current.add(node.id);
                                                    setFakeCursorId(null);
                                                }}
                                                onBlur={() => {
                                                    editingBlocksRef.current.delete(node.id);
                                                }}
                                                onInput={(e) => handleParagraphInput(e, node.id)}
                                                onKeyDown={(e) => handleParagraphKeyDown(e, node.id)}
                                                onCompositionStart={() => { isComposingRef.current = true; }}
                                                onCompositionEnd={() => { isComposingRef.current = false; }}
                                                style={{ fontSize: 16, color: "var(--text-main)", lineHeight: 1.75, outline: "none", minHeight: "1em", whiteSpace: "pre-wrap" }}
                                            />
                                        </div>
                                    );
                                }
                                if (node.type === "attachment") {
                                    const file = files[node.fileId];
                                    const isImage = file && file.type && file.type.startsWith("image/");
                                    const handleAttachmentClick = (e) => {
                                        if (!editorRef.current) return;
                                        const rect = e.currentTarget.getBoundingClientRect();
                                        if (e.clientX < rect.right - 32) return;
                                        setFakeCursorId(node.id);
                                        const doc = docRef.current;
                                        const idx = doc.findIndex(n => n.id === node.id);
                                        const next = doc[idx + 1];
                                        if (!next || next.type !== "paragraph") return;
                                        const paragraphs = editorRef.current.querySelectorAll('[data-type="paragraph"]');
                                        if (!paragraphs) return;
                                        const nextIdx = doc.slice(0, idx + 1).filter(n => n.type === "paragraph").length;
                                        const targetEl = paragraphs[nextIdx];
                                        if (!targetEl) return;
                                        targetEl.focus();
                                        const range = document.createRange();
                                        const textNode = targetEl.firstChild || targetEl;
                                        range.setStart(textNode, 0);
                                        range.collapse(true);
                                        const sel = window.getSelection();
                                        sel.removeAllRanges();
                                        sel.addRange(range);
                                    };
                                    return (
                                        <div key={node.id} className="block" draggable
                                             onDragStart={(e) => onDragStart(e, node.id)}
                                             onDragEnd={onDragEnd}
                                             onDragOver={(e) => onDragOver(e, realIndex)}
                                             onClick={handleAttachmentClick}
                                             style={{ position: "relative", margin: "8px 0" }}
                                        >
                                            {dragOverIndex === realIndex && <div className="drop-indicator" />}
                                            {!file ? (
                                                <div className="attachment-placeholder" />
                                            ) : isImage ? (
                                                <div style={{ position: "relative" }}>
                                                    <LazyImage file={file} />
                                                    {fakeCursorId === node.id && <div className="fake-cursor" />}
                                                </div>
                                            ) : (
                                                <div style={{ position: "relative", display: "flex", alignItems: "center", gap: 12, padding: 12, background: "var(--card-bg)", borderRadius: 12 }}>
                                                    <span style={{ fontSize: 28 }}>📄</span>
                                                    <div style={{ flex: 1 }}>
                                                        <div style={{ fontSize: 14, fontWeight: 500 }}>{file.name}</div>
                                                        <div style={{ fontSize: 11, color: "var(--text-secondary)" }}>{(file.size/1024).toFixed(1)} KB</div>
                                                    </div>
                                                    {fakeCursorId === node.id && <div className="fake-cursor" />}
                                                </div>
                                            )}
                                        </div>
                                    );
                                }
                                return null;
                            })}
                        </div>
                    </div>
                    <div style={{ height: 40 }} />
                </div>

                <input ref={fileInputRef} type="file" multiple accept="image/*,application/pdf,text/plain" onChange={handleFilesSelected} style={{ display: "none" }} />
            </div>
        );
    }

    /* ---------- MemoList ---------- */
    function MemoList() {
        const [memos, setMemos] = useState(() => {
            try {
                const saved = localStorage.getItem("memos_app_v2");
                const parsed = saved ? JSON.parse(saved) : [];
                return parsed.map(m => {
                    if (!m.doc && m.content !== undefined) {
                        return Object.assign({}, m, { doc: [{ id: genId(), type: "paragraph", children: [{ text: m.content || "" }] }], content: undefined });
                    }
                    if (!m.doc) return Object.assign({}, m, { doc: [{ id: genId(), type: "paragraph", children: [{ text: "" }] }] });
                    if (!m.createdAt) m.createdAt = m.updatedAt || new Date().toISOString();
                    return m;
                });
            } catch { return []; }
        });
        const [editingMemoId, setEditingMemoId] = useState(null);
        const editingMemo = editingMemoId ? memos.find(m => m.id === editingMemoId) || null : null;
        const scrollRestoreRef = useRef(0);

        const [scrollY, setScrollY] = useState(0);
        const TITLE_THRESHOLD = 30;

        const scrollTimerRef = useRef(null);
        const rafRef = useRef(null);
        useEffect(() => {
            const titleEl = document.querySelector('.page-title');
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const metaTheme = document.querySelector('meta[name="theme-color"]:not([media])') ||
                document.querySelector(`meta[name="theme-color"][media="(prefers-color-scheme: ${isDark ? 'dark' : 'light'})"]`);
            const bgColor = isDark ? '#1C1C1E' : '#F2F2F7';
            const glassColor = isDark ? 'rgba(28,28,30,0.72)' : 'rgba(242,242,247,0.72)';

            const handleScroll = () => {
                if (rafRef.current) return;
                rafRef.current = requestAnimationFrame(() => {
                    rafRef.current = null;
                    const sy = Math.max(0, window.scrollY);
                    setScrollY(sy);
                    if (metaTheme) {
                        metaTheme.content = sy > TITLE_THRESHOLD ? glassColor : bgColor;
                    }
                    if (titleEl) titleEl.classList.add('scrolling');
                    clearTimeout(scrollTimerRef.current);
                    scrollTimerRef.current = setTimeout(() => {
                        if (titleEl) titleEl.classList.remove('scrolling');
                    }, 200);
                });
            };
            window.addEventListener('scroll', handleScroll, { passive: true });
            return () => {
                window.removeEventListener('scroll', handleScroll);
                clearTimeout(scrollTimerRef.current);
                if (rafRef.current) cancelAnimationFrame(rafRef.current);
                if (metaTheme) metaTheme.content = bgColor;
            };
        }, []);

        const shrinkProgress = Math.min(Math.max(scrollY / TITLE_THRESHOLD, 0), 1);
        const titleScale = 1 - shrinkProgress * 0.45;
        const titleTranslateY = shrinkProgress * -4;
        const titleOpacity = 1 - shrinkProgress * 0.3;
        const isCompact = shrinkProgress >= 1;

        useEffect(() => {
            try {
                const safe = memos.map(m => ({
                    ...m,
                    doc: m.doc ? m.doc.map(n => {
                        if (n.thumbDataUrl) { const { thumbDataUrl, ...rest } = n; return rest; }
                        return n;
                    }) : m.doc
                }));
                localStorage.setItem("memos_app_v2", JSON.stringify(safe));
            } catch(e) {}
        }, [memos]);

        const openEditor = (memo) => {
            if (memo.id === NEW_CARD_ID) {
                handleNew();
                return;
            }
            scrollRestoreRef.current = window.scrollY;
            setEditingMemoId(memo.id);
        };
        const closeEditor = () => {
            const savedScroll = scrollRestoreRef.current;
            setEditingMemoId(null);
            if (savedScroll > 0) {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        window.scrollTo(0, savedScroll);
                    });
                });
            }
        };

        const handleNew = () => {
            const now = new Date().toISOString();
            const newMemo = {
                id: Date.now().toString(),
                title: "无标题",
                doc: [{ id: genId(), type: "paragraph", children: [{ text: "" }] }],
                pinned: false,
                createdAt: now,
                updatedAt: now
            };
            setMemos(ms => [newMemo, ...ms]);
            scrollRestoreRef.current = window.scrollY;
            setEditingMemoId(newMemo.id);
        };

        const togglePin = (id) => {
            if (id === NEW_CARD_ID) return;
            setMemos(ms => ms.map(m => m.id === id ? Object.assign({}, m, { pinned: !m.pinned, updatedAt: new Date().toISOString() }) : m));
        };
        const deleteMemo = (id) => {
            if (id === NEW_CARD_ID) return;
            const target = memos.find(m => m.id === id);
            if (target && target.doc) {
                const fileIds = target.doc.filter(n => n.type === "attachment").map(n => n.fileId);
                if (fileIds.length > 0) {
                    getDB().then(db => {
                        fileIds.forEach(fid => deleteAttachmentFromDB(db, fid).catch(() => {}));
                    }).catch(() => {});
                }
            }
            setMemos(ms => ms.filter(m => m.id !== id));
            if (editingMemo && editingMemo.id === id) closeEditor();
        };
        const saveMemo = useCallback((id, changes) => setMemos(ms => ms.map(m => m.id === id ? Object.assign({}, m, changes) : m)), []);

        const newCardDoc = useMemo(() => [{ id: genId(), type: "paragraph", children: [{ text: "" }] }], []);

        const sorted = useMemo(() => {
            return [...memos].sort((a,b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || new Date(b.updatedAt) - new Date(a.updatedAt));
        }, [memos]);

        const groupedItems = useMemo(() => {
            const groups = [];
            let pinnedMemos = [];
            let currentLabel = null;
            let currentMemos = [];

            sorted.forEach(memo => {
                if (memo.pinned) {
                    pinnedMemos.push(memo);
                    return;
                }
                const label = getSectionLabel(memo.createdAt || memo.updatedAt);
                if (label !== currentLabel) {
                    if (currentLabel !== null && currentMemos.length > 0) {
                        groups.push({ label: currentLabel, memos: currentMemos });
                    }
                    currentLabel = label;
                    currentMemos = [memo];
                } else {
                    currentMemos.push(memo);
                }
            });
            if (currentLabel !== null && currentMemos.length > 0) {
                groups.push({ label: currentLabel, memos: currentMemos });
            }
            if (pinnedMemos.length > 0) {
                groups.unshift({ label: "置顶", memos: pinnedMemos });
            }
            return groups;
        }, [sorted]);

        const isEditorOpen = !!editingMemo;

        return (
            <>
                {!isEditorOpen && (
                    <div>
                        <header className="main-header">
                            <div className="header-actions">
                            </div>
                        </header>

                        {/* 小标题：独立 fixed，不受滚动影响 */}
                        <div className="page-title compact" style={{
                            visibility: isCompact ? 'visible' : 'hidden',
                            opacity: isCompact ? 1 : 0,
                        }}>
                            此刻
                        </div>

                        {/* 大标题：始终保留，通过 visibility/opacity 控制显隐 */}
                        <h1 className="page-title" style={{
                            transform: `scale(${titleScale}) translateY(${titleTranslateY}px)`,
                            opacity: isCompact ? 0 : titleOpacity,
                            visibility: isCompact ? 'hidden' : 'visible',
                            transformOrigin: 'left center',
                        }}>
                            此刻
                        </h1>

                        <div className="container">
                            <div className="list-group">
                                <SwipeRow
                                    memo={{
                                        id: NEW_CARD_ID,
                                        title: "新建笔记",
                                        doc: newCardDoc,
                                        pinned: true,
                                        createdAt: "",
                                        updatedAt: "",
                                        isVirtual: true
                                    }}
                                    onOpen={() => handleNew()}
                                    onPin={() => {}}
                                    onDelete={() => {}}
                                />
                            </div>

                            {sorted.length === 0 ? (
                                <div className="empty-tip">暂无笔记，点击上方新建</div>
                            ) : (
                                groupedItems.map((group, gi) => (
                                    <div key={`group-${group.label}-${gi}`}>
                                        <div className="section-header">{group.label}</div>
                                        <div className="list-group">
                                            {group.memos.map(memo => (
                                                <SwipeRow
                                                    key={memo.id}
                                                    memo={memo}
                                                    onOpen={() => openEditor(memo)}
                                                    onPin={togglePin}
                                                    onDelete={deleteMemo}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                )}

                {editingMemo && (
                    <Editor
                        memo={editingMemo}
                        onClose={closeEditor}
                        onSave={saveMemo}
                    />
                )}
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById("memo-list-root")).render(<MemoList />);
</script>

<script>
    (function() {
        if (("standalone" in window.navigator) && window.navigator.standalone) {
            document.addEventListener("click", function(e) {
                let nod = e.target;
                while (nod && nod.nodeName !== "A") nod = nod.parentNode;
                if (nod && "href" in nod && (nod.href.indexOf(window.location.host) !== -1 || nod.href.startsWith("/") || nod.href.startsWith("#"))) {
                    e.preventDefault();
                    window.location.href = nod.href;
                }
            }, false);
        }
    })();
</script>
