<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="此刻">

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">

    <link rel="apple-touch-startup-image" href="light-splash.png" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-startup-image" href="dark-splash.png" media="(prefers-color-scheme: dark)">

    <title>此刻</title>

    <style>
        :root {
            --primary-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-secondary: #8e8e93;
            --card-bg: #f6f8fa;
            --btn-bg: rgba(240, 240, 242, 0.8);
            --border-color: rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-bg: #000000;
                --text-main: #ffffff;
                --text-secondary: #98989d;
                --card-bg: #1c1c1e;
                --btn-bg: rgba(44, 44, 46, 0.8);
                --border-color: rgba(255, 255, 255, 0.1);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            padding-bottom: env(safe-area-inset-bottom);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding-top: env(safe-area-inset-top);
            width: 100%;
            background-color: transparent;
        }

        .header-actions {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 16px;
            gap: 12px;
        }

        .action-btn {
            background: var(--btn-bg);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .page-title {
            padding: 10px 20px;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .container {
            padding: 16px;
        }

        .list-group {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .list-item {
            padding: 16px;
            border-bottom: 0.5px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .item-count {
            color: var(--text-secondary);
            font-size: 15px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-actions">
            <div class="action-btn">📁⁺</div>
            <a href="index.html" class="action-btn">管理</a>
        </div>
    </header>

    <div class="page-title">此刻</div>

    <div class="container">
        <div class="list-group">
            <a href="#" class="list-item">
                <span>全部笔记</span>
                <span class="item-count">12</span>
            </a>
            <a href="#" class="list-item">
                <span>今日感悟</span>
                <span class="item-count">3</span>
            </a>
        </div>
    </div>

    <footer>此刻 · 记录当下</footer>

    <script>
        (function() {
            if (("standalone" in window.navigator) && window.navigator.standalone) {
                document.addEventListener("click", function(e) {
                    let nod = e.target;
                    while (nod && nod.nodeName !== "A") nod = nod.parentNode;
                    if (nod && "href" in nod && (nod.href.indexOf(window.location.host) !== -1 || nod.href.startsWith("/") || nod.href.startsWith("#"))) {
                        e.preventDefault();
                        window.location.href = nod.href;
                    }
                }, false);
            }
        })();
    </script>
</body>
</html>
