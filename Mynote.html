    // ---------- IndexedDB 工具 ----------
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('MemosDB', 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('attachments')) {
            db.createObjectStore('attachments', { keyPath: 'id' });
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }
    async function saveAttachmentToDB(db, attachment) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('attachments', 'readwrite');
        tx.objectStore('attachments').put(attachment);
        tx.oncomplete = () => resolve();
        tx.onerror = (e) => reject(e.target.error);
      });
    }
    async function loadAttachmentFromDB(db, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('attachments', 'readonly');
        const req = tx.objectStore('attachments').get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = (e) => reject(e.target.error);
      });
    }
    async function deleteAttachmentFromDB(db, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('attachments', 'readwrite');
        tx.objectStore('attachments').delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    function fileIcon(name) { const ext = name.split(".").pop()?.toLowerCase(); return FILE_ICONS[ext] ?? FILE_ICONS.default; }

    function timeAgo(iso, lang = "zh") {
      const diff = Date.now() - new Date(iso).getTime(); const m = Math.floor(diff / 60000);
      if (lang === "en") { if (m < 1) return "just now"; if (m < 60) return `${m}m ago`; const h = Math.floor(m / 60); if (h < 24) return `${h}h ago`; return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" }); }

    }
    function makeTextBlock(text = "") { return { id: Math.random().toString(36).slice(2), type: "text", text }; }

    function ensureBlocks(memo) { if (Array.isArray(memo.blocks) && memo.blocks.length) return memo.blocks; return [makeTextBlock(memo.content || "")]; }

    function classifyUrl(url) {
      try { const u = new URL(url); const host = u.hostname.replace(/^www\./, ""); if (host === "music.163.com" || host === "y.music.163.com") { const isSong = /\/song/.test(u.pathname) || u.hash?.includes("song") || u.searchParams.get("id"); const isAlbum = /\/album/.test(u.pathname) || u.hash?.includes("album"); const isList = /\/playlist/.test(u.pathname) || u.hash?.includes("playlist"); const isArtist = /\/artist/.test(u.pathname) || u.hash?.includes("artist"); return { platform: "netease", label: "网易云音乐", icon: "🎵", color: "#C20C0C", bgLight: "#fff5f5", bgDark: "#2a0a0a", kind: isSong ? "单曲" : isAlbum ? "专辑" : isList ? "歌单" : isArtist ? "歌手" : "音乐" }; } if (host === "y.qq.com" || host === "i.y.qq.com") { return { platform: "qqmusic", label: "QQ 音乐", icon: "🎶", color: "#1DB954", bgLight: "#f0faf4", bgDark: "#0a2010", kind: "音乐" }; } if (host === "weibo.com" || host === "m.weibo.cn" || host === "t.cn") { return { platform: "weibo", label: "微博", icon: "🟠", color: "#E6162D", bgLight: "#fff8f5", bgDark: "#2a0a06", kind: "内容" }; } if (host === "mp.weixin.qq.com") { return { platform: "wechat", label: "微信公众号", icon: "💬", color: "#07C160", bgLight: "#f0fff6", bgDark: "#071a0e", kind: "文章" }; } if (host === "bilibili.com" || host === "b23.tv" || host === "www.bilibili.com") { return { platform: "bilibili", label: "哔哩哔哩", icon: "📺", color: "#00A1D6", bgLight: "#f0faff", bgDark: "#031520", kind: "视频" }; } if (host === "youtube.com" || host === "youtu.be") { return { platform: "youtube", label: "YouTube", icon: "▶️", color: "#FF0000", bgLight: "#fff5f5", bgDark: "#1a0505", kind: "视频" }; } if (host === "douyin.com" || host === "v.douyin.com") { return { platform: "douyin", label: "抖音", icon: "🎬", color: "#161823", bgLight: "#f8f8ff", bgDark: "#0a0a1a", kind: "短视频" }; } if (host === "xiaohongshu.com" || host === "xhslink.com") { return { platform: "xhs", label: "小红书", icon: "📖", color: "#FE2C55", bgLight: "#fff5f7", bgDark: "#200610", kind: "笔记" }; } if (host === "zhihu.com"     function LinkCard({ url, dark, onRemove }) { const info = classifyUrl(url); if (!info) return null; const bg = dark ? info.bgDark : info.bgLight; const displayUrl = (() => { try { const u = new URL(url); return u.hostname.replace(/^www\./, "") + (u.pathname.length > 1 ? u.pathname.slice(0, 28) + (u.pathname.length > 28 ? "…" : "") : ""); } catch { return url.slice(0, 36); } })(); return (<div style={{ display: "flex", alignItems: "center", gap: 10, background: bg, borderRadius: 999, padding: "8px 14px 8px 10px", cursor: "pointer", position: "relative", transition: "opacity 0.15s, box-shadow 0.15s", marginTop: 2, maxWidth: "100%", boxShadow: dark ? "0 4px 12px rgba(0,0,0,0.4)" : "0 2px 8px rgba(0,0,0,0.06)", }} onClick={() => window.open(url, "_blank", "noopener,noreferrer")} title={url}><span style={{ fontSize: 18, flexShrink: 0, lineHeight: 1 }}>{info.icon}</span><div style={{ flex: 1, minWidth: 0 }}><div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 1 }}><span style={{ fontSize: 11, fontWeight: 600, color: info.color, letterSpacing: 0.3 }}>{info.label}</span><span style={{ fontSize: 10, color: dark ? "#8b8b8b" : "#b5aca2", background: dark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)", borderRadius: 999, padding: "1px 6px" }}>{info.kind}</span></div><div style={{ fontSize: 11, color: dark ? "#8b8b8b" : "#aaa", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>{displayUrl}</div></div><button onClick={e => { e.stopPropagation(); onRemove(); }} title="移除卡片" style={{ border: "none", background: dark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)", cursor: "pointer", color: dark ? "#8b8b8b" : "#bbb", fontSize: 11, width: 20, height: 20, borderRadius: "50%", flexShrink: 0, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center", transition: "color 0.12s" }} onMouseEnter={e => e.currentTarget.style.color = "#d04040"} onMouseLeave={e => e.currentTarget.style.color = dark ? "#8b8b8b" : "#bbb"}>✕</button></div>); }

                          <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "flex-start", gap: 8 }}>
                            <AttachmentChip file={file} dark={actualDark} onRemove={(fileId) => removeAttachment(active.id, fileId)} onOpen={openAttachment} />
                            <input value={block.caption || ""} onChange={e => updateAttachmentCaption(active.id, block.id, e.target.value)} placeholder={activeLang === "zh" ? "添加附件说明…" : "Add file note…"} style={{ width: isMobile ? "100%" : 280, maxWidth: "100%", fontSize: 13, lineHeight: 1.6, color: t.textSub, fontFamily: settings.fontFamily, textAlign: "left", border: "none", outline: "none", background: "transparent" }} />
                          </div>
                        </div>
                      );
                    }
                    if (block.type === "link") {
                      const linkIdx = activeBlocks.findIndex(b => b.id === block.id);
                      const nextTextBlock = activeBlocks.slice(linkIdx + 1).find(b => b.type === "text");
                      return (
                        <div key={block.id} style={{ display: "flex", flexDirection: "column" }}>
                          <LinkCard url={block.url} dark={actualDark} onRemove={() => removeLinkBlock(active.id, block.id)} />
                          {nextTextBlock && (
                            <div style={{ height: 8, cursor: "text" }} onClick={() => { const ta = document.querySelector(`textarea[data-blockid="${nextTextBlock.id}"]`); if (ta) { ta.focus(); const len = ta.value.length; ta.setSelectionRange(len, len); } }} />
                          )}
                        </div>
                      );
                    }
                    return (
                      <textarea key={block.id} data-blockid={block.id} value={block.text}
                        ref={el => { if (el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; } }}
                        onFocus={e => { setActiveTextBlockId(block.id); e.target.style.height = "auto"; e.target.style.height = e.target.scrollHeight + "px"; }}
                        onClick={() => setActiveTextBlockId(block.id)}
                        onChange={e => { updateTextBlock(active.id, block.id, e.target.value); e.target.style.height = "auto"; e.target.style.height = e.target.scrollHeight + "px"; }}
                        placeholder="" rows={1}
                        style={{ display: "block", width: "100%", minHeight: block.text ? 32 : 80, fontSize: bodyFontSize, fontFamily: settings.fontFamily, color: t.text, lineHeight: bodyLineHeight, letterSpacing: 0.2, overflow: "hidden", border: "none", outline: "none", background: "transparent" }}
                      />
                    );
                  })}
                </div>
                </div>
              </div>
          </div>
        </main>
      ) : showEditorPane ? (
        <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: t.editorBg, gap: 14, padding: shellPadding }}>
          <div style={{ fontSize: isMobile ? 38 : 44, opacity: 0.1, color: t.text }}>✎</div>
          <p style={{ color: t.textMuted, fontSize: isMobile ? 13 : 14, letterSpacing: 1.2, textAlign: "center" }}>{L.emptyEditor}</p>
        </main>
      ) : null}

      {showSettings && (
        <SettingsPanel dark={actualDark} settings={settings} onChange={setSetting} tags={tags} onTagsChange={setTags}
          L={L} activeLang={activeLang} account={account} onLogout={handleLogout} guestMode={guestMode} onRelogin={handleRelogin}
          onClose={() => setShowSettings(false)} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
