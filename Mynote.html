<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>此刻</title>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root {
            --primary-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-secondary: #8e8e93;
            --card-bg: #f6f8fa;
            --btn-bg: rgba(240, 240, 242, 0.7);
            --border-color: rgba(0, 0, 0, 0.05);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary-bg: #000000;
                --text-main: #ffffff;
                --text-secondary: #98989d;
                --card-bg: #1c1c1e;
                --btn-bg: rgba(44, 44, 46, 0.7);
                --border-color: rgba(255, 255, 255, 0.1);
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { background-color: var(--primary-bg); }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ========== 顶部全透明控制 ========== */
        @supports (padding: env(safe-area-inset-top)) {
            body::before {
                content: '';
                position: fixed;
                top: 0; left: 0; right: 0;
                height: calc(env(safe-area-inset-top) * 1.2);
                background: linear-gradient(
                    to bottom,
                    rgba(255, 255, 255, 0.82) 0%,
                    rgba(255, 255, 255, 0.6) 50%,
                    rgba(255, 255, 255, 0) 100%
                );
                z-index: 9999;
                pointer-events: none;
            }
            @media (prefers-color-scheme: dark) {
                body::before {
                    background: linear-gradient(
                        to bottom,
                        rgba(0, 0, 0, 0.82) 0%,
                        rgba(0, 0, 0, 0.6) 50%,
                        rgba(0, 0, 0, 0) 100%
                    );
                }
            }
        }
        header {
            position: sticky; top: 0; z-index: 2000;
            padding-top: env(safe-area-inset-top);
            width: 100%;
            background: transparent;
            pointer-events: none;
        }
        /* ========== 顶部全透明控制 END ========== */

        .header-actions {
            height: 44px; display: flex; align-items: center; justify-content: flex-end;
            padding: 0 16px; gap: 12px; pointer-events: auto;
        }
        .action-btn, .editor-btn {
            background: var(--btn-bg);
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 0.5px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .action-btn {
            padding: 6px 12px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 500;
        }
        .editor-btn {
            padding: 0;
            height: 46px;
            border-radius: 23px;
            font-size: 15px;
            font-weight: 600;
        }
        .editor-btn.more-btn {
            border-radius: 50%;
        }
        .page-title {
            position: relative; z-index: 1000; padding: 4px 20px 10px 20px;
            font-size: 34px; font-weight: 800; letter-spacing: -1px; pointer-events: none; opacity: 0.9;
            transition: none;
            text-align: left;
        }
        .page-title.scrolling {
            will-change: transform, opacity;
        }
        .page-title.compact {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 7px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 2500;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
            padding: 6px 16px;
            border-radius: 20px;
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 0.5px solid var(--border-color);
            opacity: 1;
            pointer-events: none;
            white-space: nowrap;
            line-height: 1.2;
            width: fit-content;
        }
        .container { 
            padding: 46px 16px 12px;
        }
        .list-group {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden; margin-bottom: 20px;
        }
        .swipe-wrapper { position: relative; overflow: hidden; }
        .swipe-actions {
            position: absolute; right: 0; top: 0; bottom: 0;
            display: flex; align-items: stretch; width: 140px;
        }
        .swipe-action-btn {
            flex: 1; border: none; cursor: pointer; display: flex;
            flex-direction: column; align-items: center; justify-content: center; gap: 3px;
            color: #fff; font-size: 10.5px; font-family: inherit; font-weight: 600;
        }
        .swipe-action-btn span { font-size: 17px; }
        .list-item {
            position: relative; z-index: 1; padding: 12px 16px;
            border-bottom: 0.5px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); cursor: pointer;
            transition: transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94);
            user-select: none; gap: 12px;
        }
        .list-item:last-child { border-bottom: none; }
        .item-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
        .item-title {
            font-size: 15px; font-weight: 700; color: var(--text-main);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; gap: 5px;
        }
        .item-title.new-card-title {
            color: var(--text-secondary);
            font-weight: 600;
        }
        .pin-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); flex-shrink: 0; opacity: 0.5; }
        .item-meta { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-thumb {
            width: 52px; height: 52px; border-radius: 8px; object-fit: cover;
            flex-shrink: 0; background: var(--border-color);
        }
        .item-right { display: none; }
        .item-time { font-size: 12px; color: var(--text-secondary); }
        .empty-tip { text-align: center; padding: 40px 0; color: var(--text-secondary); font-size: 15px; }
        .section-header {
            padding: 20px 4px 8px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            background: transparent;
            letter-spacing: -0.3px;
        }
        .section-header:first-child {
            padding-top: 8px;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .attachment-placeholder {
            height: 180px; margin: 8px 0; border-radius: 12px;
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        .block {
            transition: transform 0.15s ease, opacity 0.15s ease;
            cursor: default;
        }
        .block.dragging { opacity: 0.4; }
        @media (hover: hover) {
            .block:hover { background: rgba(0,0,0,0.02); }
        }
        .drop-indicator {
            height: 3px; background: #007aff; margin: 4px 0; border-radius: 2px;
        }
        @keyframes fakeBlink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .fake-cursor {
            position: absolute; top: 6px; bottom: 6px; right: 4px;
            width: 2.5px; border-radius: 1px; background: #007aff;
            animation: fakeBlink 1.05s step-start infinite;
            pointer-events: none; z-index: 10;
        }
        .lazy-img-placeholder {
            width: 100%; height: 200px; border-radius: 12px;
            background: var(--card-bg); display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 15px;
        }
        .virtual-scroll {
            position: relative;
            width: 100%;
        }
        .lazy-img-wrapper {
            position: relative;
            width: 100%;
            max-height: 400px;
            overflow: hidden;
            border-radius: 12px;
        }
        .lazy-img-thumb {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            border-radius: 12px;
            max-height: 400px;
        }
        .lazy-img-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lazy-img-full.loaded {
            opacity: 1;
        }
        /* 编辑器悬浮按钮 */
        .editor-fab {
            position: fixed;
            z-index: 3001;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 23px;
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 0.5px solid var(--border-color);
            cursor: pointer;
            padding: 0;
        }
        .editor-fab.left {
            left: 16px;
            top: calc(env(safe-area-inset-top) + 7px);
        }
        .editor-fab.right {
            right: 16px;
            top: calc(env(safe-area-inset-top) + 7px);
        }
        /* 备份管理页面卡片 */
        .backup-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .backup-card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .backup-card p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .backup-btn {
            background: var(--btn-bg);
            color: var(--text-main);
            border: 0.5px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-right: 8px;
            margin-bottom: 4px;
            font-family: inherit;
        }
        .backup-status {
            background: var(--card-bg);
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div id="memo-list-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const genId = () => Math.random().toString(36).slice(2, 10);
        function timeAgo(iso) {
            if (!iso) return "现在";
            const diff = Date.now() - new Date(iso).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return "刚刚";
            if (m < 60) return `${m} 分钟前`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h} 小时前`;
            const d = new Date(iso);
            const now = new Date();
            if (d.getFullYear() === now.getFullYear())
                return `${d.getMonth()+1}/${d.getDate()}`;
            return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
        }

        const NEW_CARD_ID = "__new_memo_card__";

        /* ---------- Google Drive 配置 ---------- */
        const GOOGLE_CLIENT_ID = '369692322774-se6hvcg8lvlacbgl8hf3u4d3tme7aeht.apps.googleusercontent.com';
        const GOOGLE_API_KEY = 'YOUR_API_KEY';
        const BACKUP_FILE_NAME = 'memories_backup.json';

        /* ---------- DB 单例 ---------- */
        let _dbInstance = null;
        function getDB() {
            if (_dbInstance) return Promise.resolve(_dbInstance);
            return openDB().then(db => { _dbInstance = db; return db; });
        }

        function getSectionLabel(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today.getTime() - 86400000);
            const sevenDaysAgo = new Date(today.getTime() - 7 * 86400000);
            const thirtyDaysAgo = new Date(today.getTime() - 30 * 86400000);

            if (date >= today) return "今天";
            if (date >= yesterday) return "昨天";
            if (date >= sevenDaysAgo) return "过去7天";
            if (date >= thirtyDaysAgo) return "过去30天";
            if (date.getFullYear() === now.getFullYear()) {
                return `${date.getMonth() + 1}月`;
            }
            return `${date.getFullYear()}年`;
        }

        /* ---------- IndexedDB ---------- */
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MemosDB', 2);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('attachments')) {
                        db.createObjectStore('attachments', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('avatars')) {
                        db.createObjectStore('avatars', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }
        async function saveAttachmentToDB(db, obj) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('attachments', 'readwrite');
                tx.objectStore('attachments').put(obj);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }
        async function loadAttachmentFromDB(db, id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('attachments', 'readonly');
                const req = tx.objectStore('attachments').get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e.target.error);
            });
        }
        async function deleteAttachmentFromDB(db, id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('attachments', 'readwrite');
                tx.objectStore('attachments').delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveAvatarToDB(db, memoId, dataUrl) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('avatars', 'readwrite');
                tx.objectStore('avatars').put({ id: memoId, dataUrl });
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }
        async function loadAvatarFromDB(db, memoId) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('avatars', 'readonly');
                const req = tx.objectStore('avatars').get(memoId);
                req.onsuccess = () => resolve(req.result ? req.result.dataUrl : null);
                req.onerror = (e) => reject(e.target.error);
            });
        }

        function createThumbnail(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const size = 200;
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    const side = Math.min(img.width, img.height);
                    const sx = (img.width - side) / 2;
                    const sy = (img.height - side) / 2;
                    ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
                    resolve(canvas.toDataURL('image/jpeg', 0.92));
                };
                img.src = dataUrl;
            });
        }

        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            const n = bstr.length;
            const u8arr = new Uint8Array(n);
            for (let i = 0; i < n; i++) u8arr[i] = bstr.charCodeAt(i);
            return new Blob([u8arr], { type: mime });
        }

        /* ---------- SwipeRow ---------- */
        function SwipeRow({ memo, onOpen, onPin, onDelete }) {
            const rowRef = useRef(null);
            const startXRef = useRef(null);
            const startYRef = useRef(null);
            const currentXRef = useRef(0);
            const openedRef = useRef(false);
            const swipingRef = useRef(false);
            const ACTION_W = 140, THRESHOLD = 55, MIN_DX = 5;
            const [thumb, setThumb] = useState(null);
            const isNewCard = memo.id === NEW_CARD_ID;

            const setTranslate = (x) => { if (rowRef.current) rowRef.current.style.transform = `translateX(${x}px)`; };
            const snapOpen  = () => { setTranslate(-ACTION_W); openedRef.current = true;  currentXRef.current = -ACTION_W; };
            const snapClose = () => { setTranslate(0); openedRef.current = false; currentXRef.current = 0; swipingRef.current = false; };

            const onTouchStart = (e) => {
                if (isNewCard) return;
                startXRef.current = e.touches[0].clientX;
                startYRef.current = e.touches[0].clientY;
                swipingRef.current = false;
                if (rowRef.current) rowRef.current.style.transition = "none";
            };
            const onTouchMove = (e) => {
                if (isNewCard || startXRef.current === null) return;
                const dx = e.touches[0].clientX - startXRef.current;
                const dy = e.touches[0].clientY - startYRef.current;
                if (!swipingRef.current && Math.abs(dy) > Math.abs(dx) + 8) {
                    snapClose(); startXRef.current = null; return;
                }
                if (!swipingRef.current && Math.abs(dx) > MIN_DX) swipingRef.current = true;
                if (!swipingRef.current) return;
                e.preventDefault();
                const base = openedRef.current ? -ACTION_W : 0;
                const next = Math.min(0, Math.max(-ACTION_W, base + dx));
                setTranslate(next);
                currentXRef.current = next;
            };
            const onTouchEnd = () => {
                if (isNewCard) return;
                if (rowRef.current) rowRef.current.style.transition = "transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)";
                if (openedRef.current) {
                    currentXRef.current > -ACTION_W + THRESHOLD ? snapClose() : snapOpen();
                } else {
                    currentXRef.current < -THRESHOLD ? snapOpen() : snapClose();
                }
                startXRef.current = null;
            };

            useEffect(() => {
                if (isNewCard) return;
                setThumb(null);
                const firstAttach = memo.doc && memo.doc.find(n => n.type === "attachment");
                if (!firstAttach) return;
                if (firstAttach.thumbDataUrl) {
                    setThumb(firstAttach.thumbDataUrl);
                    return;
                }
                let cancelled = false;
                (async () => {
                    try {
                        const db = await getDB();
                        for (let attempt = 0; attempt < 5; attempt++) {
                            if (cancelled) return;
                            const stored = await loadAttachmentFromDB(db, firstAttach.fileId).catch(() => null);
                            if (!stored) break;
                            if (stored.type && stored.type.startsWith("image/") && stored.thumb) {
                                if (!cancelled) setThumb(stored.thumb);
                                return;
                            }
                            await new Promise(r => setTimeout(r, 300));
                        }
                    } catch(e) {}
                })();
                return () => { cancelled = true; };
            }, [memo.id, memo.doc]);

            let preview = "无更多文本";
            if (memo.doc) {
                const firstPara = memo.doc.find(n => n.type === "paragraph");
                if (firstPara && firstPara.children && firstPara.children[0]) {
                    preview = (firstPara.children[0].text || "").replace(/\n/g, " ") || "无更多文本";
                }
            }

            return (
                <div className="swipe-wrapper">
                    {!isNewCard && (
                        <div className="swipe-actions">
                            <button className="swipe-action-btn" style={{ background: "#4A90D9" }}
                                onClick={e => { e.stopPropagation(); snapClose(); onPin(memo.id); }}>
                                <span>📌</span>{memo.pinned ? "取消置顶" : "置顶"}
                            </button>
                            <button className="swipe-action-btn" style={{ background: "#E0433A" }}
                                onClick={e => { e.stopPropagation(); snapClose(); onDelete(memo.id); }}>
                                <span>🗑️</span>删除
                            </button>
                        </div>
                    )}
                    <div ref={rowRef} className="list-item" onClick={() => openedRef.current && !isNewCard ? snapClose() : onOpen(memo)}
                        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                        <div className="item-left">
                            <div className={`item-title${isNewCard ? ' new-card-title' : ''}`}>
                                {!isNewCard && memo.pinned && <span className="pin-dot" />}
                                {isNewCard ? "新建笔记" : (memo.title || "无标题")}
                            </div>
                            <div className="item-meta">
                                {isNewCard ? "现在" : timeAgo(memo.updatedAt)}&nbsp;&nbsp;{isNewCard ? "点击记录你的瞬间" : preview}
                            </div>
                        </div>
                        {!isNewCard && thumb && <img className="item-thumb" src={thumb} alt="" />}
                    </div>
                </div>
            );
        }

        /* ---------- LazyImage ---------- */
        function LazyImage({ file }) {
            const [phase, setPhase] = useState("skeleton");
            const [fullLoaded, setFullLoaded] = useState(false);
            const elRef = useRef(null);

            useEffect(() => {
                const el = elRef.current;
                if (!el) return;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setPhase("thumb");
                            observer.unobserve(el);
                        }
                    },
                    { rootMargin: "100px" }
                );
                observer.observe(el);
                return () => observer.disconnect();
            }, []);

            const handleFullLoad = () => {
                setFullLoaded(true);
                if (file.thumb && file.thumb.startsWith("blob:")) {
                    URL.revokeObjectURL(file.thumb);
                }
            };

            if (phase === "skeleton") {
                return <div ref={elRef} className="attachment-placeholder" />;
            }

            return (
                <div className="lazy-img-wrapper">
                    <img src={file.thumb || file.url} alt={file.name} className="lazy-img-thumb" />
                    <img src={file.url} alt={file.name} className={`lazy-img-full ${fullLoaded ? "loaded" : ""}`} onLoad={handleFullLoad} loading="lazy" />
                </div>
            );
        }

        /* ---------- Editor ---------- */
        function Editor({ memo, onClose, onSave }) {
            const [title, setTitle] = useState(memo.title === "无标题" ? "" : memo.title);
            const initialDoc = memo.doc || [{ id: genId(), type: "paragraph", children: [{ text: "" }] }];
            const docRef = useRef(initialDoc);
            const [renderKey, setRenderKey] = useState(0);
            const [files, setFiles] = useState({});
            const [showMenu, setShowMenu] = useState(false);
            const fileInputRef = useRef(null);
            const dbRef = useRef(null);
            const saveTimer = useRef(null);
            const editorRef = useRef(null);
            const selectionRef = useRef(null);
            const dragState = useRef({ draggingId: null, overIndex: null });
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const [fakeCursorId, setFakeCursorId] = useState(null);
            const isComposingRef = useRef(false);
            const pendingAttachmentsRef = useRef({});
            const avatarInputRef = useRef(null);
            const [avatarUrl, setAvatarUrl] = useState(null);
            const isEditingTitleRef = useRef(false);
            const editingBlocksRef = useRef(new Set());
            const savedSelectionRef = useRef(null);

            const history = useRef({ past: [], future: [] });
            const txOps = useRef([]);
            const txTimer = useRef(null);

            const heightMap = useRef({});
            const [visibleRange, setVisibleRange] = useState([0, 51]);
            const virtRef = useRef(null);
            const VIRT_THRESHOLD = 50;

            useEffect(() => {
                (async () => {
                    try {
                        const db = await getDB();
                        dbRef.current = db;
                        const av = await loadAvatarFromDB(db, memo.id).catch(() => null);
                        if (av) setAvatarUrl(av);
                        const fileIds = docRef.current.filter(n => n.type === "attachment").map(n => n.fileId);
                        if (fileIds.length === 0) return;
                        const map = {};
                        for (const fid of fileIds) {
                            const stored = await loadAttachmentFromDB(db, fid).catch(() => null);
                            if (stored) {
                                map[fid] = { name: stored.name, type: stored.type, url: stored.url, size: stored.size, thumb: stored.thumb || null };
                            }
                        }
                        if (Object.keys(map).length > 0) setFiles(map);
                    } catch(e) { console.error(e); }
                })();
            }, []);

            const titleValueRef = useRef(title);
            useEffect(() => { titleValueRef.current = title; }, [title]);

            const doSave = useCallback((d) => {
                onSave(memo.id, { title: titleValueRef.current.trim() || "无标题", doc: d, updatedAt: new Date().toISOString() });
            }, [memo.id, onSave]);

            const triggerAutoSave = useCallback(() => {
                clearTimeout(saveTimer.current);
                saveTimer.current = setTimeout(() => doSave(docRef.current), 600);
            }, [doSave]);

            useEffect(() => {
                triggerAutoSave();
                return () => clearTimeout(saveTimer.current);
            }, [title, triggerAutoSave]);

            const handleClose = async () => {
                clearTimeout(saveTimer.current);
                const pending = Object.values(pendingAttachmentsRef.current);
                if (pending.length > 0) await Promise.allSettled(pending);
                doSave(docRef.current);
                onClose();
            };

            const handleAvatarSelected = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const dataUrl = ev.target.result;
                    setAvatarUrl(dataUrl);
                    if (dbRef.current) await saveAvatarToDB(dbRef.current, memo.id, dataUrl).catch(() => {});
                };
                reader.readAsDataURL(file);
                e.target.value = "";
            };

            const recordOp = useCallback((patch) => {
                txOps.current.push(patch);
                clearTimeout(txTimer.current);
                txTimer.current = setTimeout(() => {
                    const combined = txOps.current;
                    txOps.current = [];
                    if (combined.length === 0) return;
                    const inverse = combined.map(p => {
                        if (p.op === "update") return { op: "update", index: p.index, prev: p.next, next: p.prev };
                        if (p.op === "insert") return { op: "remove", index: p.index, node: p.node };
                        if (p.op === "remove") return { op: "insert", index: p.index, node: p.node };
                        return p;
                    }).reverse();
                    history.current.past.push({ patch: combined, inverse });
                    if (history.current.past.length > 100) history.current.past.shift();
                    history.current.future = [];
                }, 400);
            }, []);

            const applyPatch = useCallback((patch) => {
                const cur = docRef.current;
                patch.forEach(p => {
                    if (p.op === "update") cur[p.index] = p.next || p.prev;
                    else if (p.op === "insert") cur.splice(p.index, 0, p.node);
                    else if (p.op === "remove") cur.splice(p.index, 1);
                });
                setRenderKey(prev => prev + 1);
            }, []);

            const undo = useCallback(() => {
                const last = history.current.past.pop();
                if (!last) return;
                applyPatch(last.inverse);
                history.current.future.push(last);
                triggerAutoSave();
            }, [applyPatch, triggerAutoSave]);

            const redo = useCallback(() => {
                const next = history.current.future.pop();
                if (!next) return;
                applyPatch(next.patch);
                history.current.past.push(next);
                triggerAutoSave();
            }, [applyPatch, triggerAutoSave]);

            useEffect(() => {
                const handler = (e) => {
                    if (e.key === "z" && (e.metaKey || e.ctrlKey)) {
                        e.preventDefault();
                        if (e.shiftKey) redo(); else undo();
                    }
                };
                window.addEventListener("keydown", handler);
                return () => window.removeEventListener("keydown", handler);
            }, [undo, redo]);

            function readSelectionFromDOM(rootEl) {
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return null;
                const range = sel.getRangeAt(0);
                let node = range.startContainer;
                while (node && node !== rootEl && !(node.dataset && node.dataset.blockid)) node = node.parentNode;
                if (!node || !node.dataset) return null;
                const blockId = node.dataset.blockid;
                const blockIndex = docRef.current.findIndex(n => n.id === blockId);
                if (blockIndex === -1) return null;
                return { blockIndex, blockId, offset: range.startOffset };
            }

            function restoreSelection(rootEl, sel) {
                if (!sel) return;
                let block = null;
                if (sel.blockId) block = rootEl.querySelector(`[data-blockid="${sel.blockId}"]`);
                if (!block) {
                    const paragraphs = rootEl.querySelectorAll('[data-type="paragraph"]');
                    block = paragraphs[sel.blockIndex];
                }
                if (!block) return;
                const range = document.createRange();
                const textNode = block.firstChild;
                if (textNode) range.setStart(textNode, Math.min(sel.offset, textNode.textContent.length));
                else range.setStart(block, 0);
                range.collapse(true);
                const s = window.getSelection();
                s.removeAllRanges();
                s.addRange(range);
                block.focus();
            }

            const splitParagraphAtSelection = useCallback(() => {
                const sel = selectionRef.current;
                if (!sel) return;
                const doc = docRef.current;
                const block = doc[sel.blockIndex];
                if (!block || block.type !== "paragraph") return;
                const text = (block.children[0] && block.children[0].text) || "";
                const before = text.slice(0, sel.offset);
                const after = text.slice(sel.offset);
                const newId = genId();
                const oldBlock = Object.assign({}, block, { children: [{ text: before }] });
                const newBlock = { id: newId, type: "paragraph", children: [{ text: after }] };
                recordOp({ op: "update", index: sel.blockIndex, prev: block, next: oldBlock });
                recordOp({ op: "insert", index: sel.blockIndex + 1, node: newBlock });
                doc[sel.blockIndex] = oldBlock;
                doc.splice(sel.blockIndex + 1, 0, newBlock);
                setRenderKey(prev => prev + 1);
                selectionRef.current = { blockIndex: sel.blockIndex + 1, blockId: newId, offset: 0 };
            }, [recordOp]);

            const insertAttachmentAtCursor = useCallback(async (file) => {
                const id = genId();
                const doc = docRef.current;
                let insertIdx;
                const sel = savedSelectionRef.current || selectionRef.current;
                if (sel) {
                    if (sel.offset > 0) {
                        const block = doc[sel.blockIndex];
                        if (block && block.type === "paragraph") {
                            const text = (block.children[0] && block.children[0].text) || "";
                            const before = text.slice(0, sel.offset);
                            const after = text.slice(sel.offset);
                            const oldBlock = Object.assign({}, block, { children: [{ text: before }] });
                            const newPara = { id: genId(), type: "paragraph", children: [{ text: after }] };
                            recordOp({ op: "update", index: sel.blockIndex, prev: block, next: oldBlock });
                            recordOp({ op: "insert", index: sel.blockIndex + 1, node: newPara });
                            doc[sel.blockIndex] = oldBlock;
                            doc.splice(sel.blockIndex + 1, 0, newPara);
                            insertIdx = sel.blockIndex + 1;
                        }
                    } else {
                        insertIdx = sel.blockIndex;
                    }
                } else {
                    insertIdx = doc.length;
                }
                const attachmentNode = { id: genId(), type: "attachment", fileId: id, status: "loading" };
                const newPara = { id: genId(), type: "paragraph", children: [{ text: "" }] };
                if (insertIdx !== undefined) {
                    recordOp({ op: "insert", index: insertIdx, node: attachmentNode });
                    recordOp({ op: "insert", index: insertIdx + 1, node: newPara });
                    doc.splice(insertIdx, 0, attachmentNode, newPara);
                } else {
                    recordOp({ op: "insert", index: doc.length, node: attachmentNode });
                    recordOp({ op: "insert", index: doc.length + 1, node: newPara });
                    doc.push(attachmentNode, newPara);
                }
                setRenderKey(prev => prev + 1);
                selectionRef.current = { blockIndex: doc.findIndex(n => n.id === newPara.id), offset: 0 };
                const url = URL.createObjectURL(file);
                setFiles(prev => (Object.assign({}, prev, { [id]: { name: file.name, type: file.type, url, size: file.size, thumb: null } })));
                const reader = new FileReader();
                const savePromise = new Promise((resolveAttach) => {
                    reader.onload = async (ev) => {
                        try {
                            const dataUrl = ev.target.result;
                            const isImg = file.type.startsWith("image/");
                            const thumb = isImg ? await createThumbnail(dataUrl) : null;
                            await saveAttachmentToDB(dbRef.current, { id, name: file.name, type: file.type, size: file.size, url: dataUrl, thumb });
                            if (thumb) {
                                const attachIdx = docRef.current.findIndex(n => n.type === "attachment" && n.fileId === id);
                                if (attachIdx !== -1) docRef.current[attachIdx] = Object.assign({}, docRef.current[attachIdx], { thumbDataUrl: thumb, status: "done" });
                            }
                            setFiles(prev => (Object.assign({}, prev, { [id]: Object.assign({}, prev[id], { thumb, url: dataUrl }) })));
                        } catch (err) { console.error("附件保存失败", err); }
                        finally { delete pendingAttachmentsRef.current[id]; resolveAttach(); }
                    };
                });
                pendingAttachmentsRef.current[id] = savePromise;
                reader.readAsDataURL(file);
            }, [recordOp]);

            const handleAddAttachment = () => { setShowMenu(false); if (fileInputRef.current) fileInputRef.current.click(); };

            const handleFilesSelected = async (e) => {
                const filesArr = Array.from(e.target.files);
                e.target.value = '';
                if (!filesArr.length) return;
                if (!dbRef.current) {
                    try { dbRef.current = await getDB(); }
                    catch(err) { console.error("DB 初始化失败", err); return; }
                }
                for (const file of filesArr) await insertAttachmentAtCursor(file);
            };

            const handleParagraphInput = (e, nodeId) => {
                const sel = readSelectionFromDOM(editorRef.current);
                if (sel) selectionRef.current = sel;
                const text = e.currentTarget.textContent;
                const doc = docRef.current;
                const index = doc.findIndex(n => n.id === nodeId);
                if (index === -1) return;
                const oldBlock = doc[index];
                const newBlock = Object.assign({}, oldBlock, { children: [{ text }] });
                doc[index] = newBlock;
                triggerAutoSave();
            };

            const handleParagraphKeyDown = (e, nodeId) => {
                const isEnter = e.key === "Enter" || e.keyCode === 13 || e.which === 13;
                if (isEnter && !isComposingRef.current) {
                    e.preventDefault();
                    setFakeCursorId(null);
                    let sel = readSelectionFromDOM(editorRef.current);
                    if (!sel) {
                        const fallbackIdx = docRef.current.findIndex(n => n.id === nodeId);
                        if (fallbackIdx !== -1) {
                            const curText = docRef.current[fallbackIdx].children[0] ? docRef.current[fallbackIdx].children[0].text : "";
                            sel = { blockIndex: fallbackIdx, blockId: nodeId, offset: curText.length };
                        }
                    }
                    if (sel) { selectionRef.current = sel; splitParagraphAtSelection(); }
                    triggerAutoSave();
                    return;
                }
                if (e.key === "Backspace") {
                    const sel = window.getSelection();
                    const doc = docRef.current;
                    const idx = doc.findIndex(n => n.id === nodeId);
                    const curBlock = idx !== -1 ? doc[idx] : null;
                    const curText = curBlock && curBlock.children[0] ? curBlock.children[0].text : "";
                    const isEmpty = curText === "";
                    const atStart = isEmpty || (sel && sel.rangeCount > 0 && sel.getRangeAt(0).startOffset === 0 && sel.getRangeAt(0).collapsed);
                    if (!atStart) { setFakeCursorId(null); return; }
                    if (idx > 0 && doc[idx - 1].type === "attachment") {
                        e.preventDefault(); setFakeCursorId(null);
                        const attachNode = doc[idx - 1];
                        removeAttachment(attachNode.id, attachNode.fileId);
                        triggerAutoSave();
                    } else if (idx > 0 && doc[idx - 1].type === "paragraph") {
                        e.preventDefault(); setFakeCursorId(null);
                        const curBlock = doc[idx];
                        const prevBlock = doc[idx - 1];
                        const curText = curBlock.children[0] ? curBlock.children[0].text : "";
                        const prevText = prevBlock.children[0] ? prevBlock.children[0].text : "";
                        const mergedOffset = prevText.length;
                        const mergedBlock = Object.assign({}, prevBlock, { children: [{ text: prevText + curText }] });
                        recordOp({ op: "update", index: idx - 1, prev: prevBlock, next: mergedBlock });
                        recordOp({ op: "remove", index: idx, node: curBlock });
                        doc[idx - 1] = mergedBlock;
                        doc.splice(idx, 1);
                        selectionRef.current = { blockIndex: idx - 1, blockId: prevBlock.id, offset: mergedOffset };
                        setRenderKey(prev => prev + 1);
                        triggerAutoSave();
                    }
                }
            };

            const resizeObserverRef = useRef(null);
            useEffect(() => {
                const observer = new ResizeObserver(entries => {
                    entries.forEach(entry => {
                        const id = entry.target.dataset.blockid;
                        if (id) heightMap.current[id] = entry.target.offsetHeight;
                    });
                });
                resizeObserverRef.current = observer;
                const observeBlocks = () => {
                    if (!editorRef.current) return;
                    editorRef.current.querySelectorAll('[data-blockid]').forEach(b => observer.observe(b));
                };
                observeBlocks();
                const mutationObserver = new MutationObserver(observeBlocks);
                if (editorRef.current) mutationObserver.observe(editorRef.current, { childList: true, subtree: true });
                return () => { observer.disconnect(); mutationObserver.disconnect(); };
            }, []);

            const calcVisibleRange = useCallback(() => {
                const el = virtRef.current;
                if (!el) return;
                const scrollTop = window.scrollY || el.scrollTop;
                const clientHeight = window.innerHeight;
                const doc = docRef.current;
                const total = doc.length;
                if (total <= VIRT_THRESHOLD) { setVisibleRange([0, total]); return; }
                let cumulative = 0, start = 0, end = total;
                for (let i = 0; i < total; i++) {
                    const h = heightMap.current[doc[i].id] || 60;
                    cumulative += h;
                    if (cumulative < scrollTop) start = i + 1;
                    if (cumulative < scrollTop + clientHeight + 200) end = i + 1;
                    else break;
                }
                start = Math.max(0, start - 2);
                end = Math.min(total, end + 2);
                setVisibleRange([start, end]);
            }, []);

            useEffect(() => {
                const handler = () => calcVisibleRange();
                window.addEventListener("scroll", handler, { passive: true });
                window.addEventListener("resize", handler);
                calcVisibleRange();
                return () => { window.removeEventListener("scroll", handler); window.removeEventListener("resize", handler); };
            }, [calcVisibleRange]);

            useEffect(() => {
                if (editorRef.current && selectionRef.current) {
                    const id = setTimeout(() => { restoreSelection(editorRef.current, selectionRef.current); selectionRef.current = null; }, 0);
                    return () => clearTimeout(id);
                }
            }, [renderKey]);

            const removeAttachment = useCallback(async (nodeId, fileId) => {
                const file = files[fileId];
                if (file) {
                    if (file.url && file.url.startsWith('blob:')) URL.revokeObjectURL(file.url);
                    if (file.thumb && file.thumb.startsWith('blob:')) URL.revokeObjectURL(file.thumb);
                }
                if (dbRef.current) await deleteAttachmentFromDB(dbRef.current, fileId).catch(() => {});
                const doc = docRef.current;
                const idx = doc.findIndex(n => n.type === "attachment" && n.fileId === fileId);
                if (idx !== -1) { recordOp({ op: "remove", index: idx, node: doc[idx] }); doc.splice(idx, 1); setRenderKey(prev => prev + 1); }
                setFiles(prev => { const n = Object.assign({}, prev); delete n[fileId]; return n; });
            }, [files, recordOp]);

            const onDragStart = (e, nodeId) => { dragState.current.draggingId = nodeId; e.dataTransfer.effectAllowed = "move"; e.currentTarget.classList.add("dragging"); };
            const onDragEnd = (e) => {
                e.currentTarget.classList.remove("dragging");
                const { draggingId, overIndex } = dragState.current;
                if (draggingId && overIndex !== null) {
                    const doc = docRef.current;
                    const fromIdx = doc.findIndex(n => n.id === draggingId);
                    if (fromIdx !== -1 && fromIdx !== overIndex) {
                        const [item] = doc.splice(fromIdx, 1);
                        const adjustIndex = overIndex > fromIdx ? overIndex - 1 : overIndex;
                        doc.splice(adjustIndex, 0, item);
                        recordOp({ op: "remove", index: fromIdx, node: item });
                        recordOp({ op: "insert", index: adjustIndex, node: item });
                        setRenderKey(prev => prev + 1);
                    }
                }
                dragState.current = { draggingId: null, overIndex: null };
                setDragOverIndex(null);
            };
            const onDragOver = (e, index) => {
                e.preventDefault(); e.dataTransfer.dropEffect = "move";
                const y = e.clientY, threshold = 80;
                if (y < threshold) window.scrollBy(0, -10);
                else if (window.innerHeight - y < threshold) window.scrollBy(0, 10);
                dragState.current.overIndex = index;
                setDragOverIndex(index);
            };

            const doc = docRef.current;
            const useVirtual = doc.length > VIRT_THRESHOLD;
            const [start, end] = visibleRange;
            const visibleDoc = useVirtual ? doc.slice(start, end) : doc;
            const totalHeight = useVirtual ? (Object.values(heightMap.current).reduce((a, b) => a + b, 0) || doc.length * 60) : 'auto';
            const offsetTop = useVirtual ? doc.slice(0, start).reduce((acc, n) => acc + (heightMap.current[n.id] || 60), 0) : 0;
            const charCount = doc.reduce((acc, n) => n.type === "paragraph" ? acc + (n.children[0] ? n.children[0].text : "").replace(/\n/g, "").length : acc, 0);

            return (
                <div style={{ background: "var(--primary-bg)", minHeight: "100vh", animation: "slideUp 0.28s cubic-bezier(0.32,0.72,0,1)" }}>
                    <button className="editor-fab left" onClick={handleClose}>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                    </button>
                    <button onClick={() => avatarInputRef.current && avatarInputRef.current.click()}
                        style={{ position: "fixed", zIndex: 3001, top: "calc(env(safe-area-inset-top) + 7px)", left: "50%", transform: "translateX(-50%)", width: 66, height: 66, borderRadius: "50%", border: "0.5px solid var(--border-color)", background: avatarUrl ? "transparent" : "var(--btn-bg)", backdropFilter: avatarUrl ? "none" : "blur(8px)", WebkitBackdropFilter: avatarUrl ? "none" : "blur(8px)", cursor: "pointer", padding: 0, overflow: "hidden" }}>
                        {avatarUrl ? <img src={avatarUrl} alt="avatar" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", imageRendering: "auto", WebkitBackfaceVisibility: "hidden" }} /> : <span style={{ fontSize: 44, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center", width: "100%", height: "100%" }}>👽</span>}
                    </button>
                    <input ref={avatarInputRef} type="file" accept="image/*" onChange={handleAvatarSelected} style={{ display: "none" }} />
                    <div style={{ position: "fixed", zIndex: 3001, top: "calc(env(safe-area-inset-top) + 7px + 66px)", left: "50%", transform: "translateX(-50%)", background: "var(--btn-bg)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", border: "0.5px solid var(--border-color)", borderRadius: 20, padding: "5px 16px 6px", display: "flex", flexDirection: "column", alignItems: "center", gap: 1, minWidth: 120, maxWidth: "60vw", whiteSpace: "nowrap", overflow: "hidden" }}>
                        <div contentEditable suppressContentEditableWarning
                            ref={el => { if (el && !isEditingTitleRef.current && el.textContent !== title) el.textContent = title || "无标题"; }}
                            onFocus={() => { isEditingTitleRef.current = true; }}
                            onBlur={e => { isEditingTitleRef.current = false; const raw = e.currentTarget.textContent.trim(); const clamped = raw.slice(0, 50) || "无标题"; if (e.currentTarget.textContent !== clamped) e.currentTarget.textContent = clamped; setTitle(clamped); }}
                            onInput={e => { if (e.currentTarget.textContent.length > 50) { e.currentTarget.textContent = e.currentTarget.textContent.slice(0, 50); const sel = window.getSelection(); if (sel && e.currentTarget.firstChild) { const range = document.createRange(); range.setStart(e.currentTarget.firstChild, 50); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); } } }}
                            onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
                            style={{ fontSize: 15, fontWeight: 600, color: "var(--text-main)", whiteSpace: "nowrap", maxWidth: "100%", letterSpacing: "-0.3px", outline: "none", minWidth: 40, cursor: "text" }} />
                        <div style={{ fontSize: 11, color: "var(--text-secondary)", letterSpacing: 0, pointerEvents: "none" }}>{timeAgo(memo.updatedAt)} · {charCount} 字</div>
                    </div>
                    <button className="editor-fab right" onClick={() => { const currentSel = readSelectionFromDOM(editorRef.current); if (currentSel) selectionRef.current = currentSel; savedSelectionRef.current = selectionRef.current ? { ...selectionRef.current } : null; setShowMenu(!showMenu); }}>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><circle cx="5" cy="12" r="2" /><circle cx="12" cy="12" r="2" /><circle cx="19" cy="12" r="2" /></svg>
                    </button>
                    {showMenu && (
                        <div style={{ position: "fixed", zIndex: 3002, right: 16, top: "calc(env(safe-area-inset-top) + 7px + 46px + 6px)", background: "var(--btn-bg)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", border: "0.5px solid var(--border-color)", borderRadius: 20, boxShadow: "0 4px 12px rgba(0,0,0,0.08)", overflow: "hidden", minWidth: 120 }}>
                            <button onClick={handleAddAttachment} style={{ width: "100%", padding: "10px 16px", border: "none", background: "none", color: "var(--text-main)", fontSize: 14, cursor: "pointer", textAlign: "left" }}>📎 添加附件</button>
                        </div>
                    )}
                    <header style={{ background: "transparent", pointerEvents: "none" }}><div style={{ height: 44 }}></div></header>
                    <div ref={editorRef} style={{ paddingLeft: 20, paddingRight: 20, paddingTop: "calc(66px + 44px + 6px)", paddingBottom: "calc(env(safe-area-inset-bottom) + 40px)" }}>
                        <div className="virtual-scroll" ref={virtRef} style={{ height: useVirtual ? totalHeight : 'auto', position: 'relative' }}>
                            <div style={{ paddingTop: useVirtual ? offsetTop : 0 }}>
                                {visibleDoc.map((node, index) => {
                                    const realIndex = useVirtual ? start + index : index;
                                    if (node.type === "paragraph") {
                                        return (
                                            <div key={node.id} className="block" draggable onDragStart={(e) => onDragStart(e, node.id)} onDragEnd={onDragEnd} onDragOver={(e) => onDragOver(e, realIndex)} style={{ marginBottom: 4 }}>
                                                {dragOverIndex === realIndex && <div className="drop-indicator" />}
                                                <div data-type="paragraph" data-blockid={node.id} contentEditable suppressContentEditableWarning
                                                    ref={el => { if (el && !editingBlocksRef.current.has(node.id)) { const expected = (node.children[0] && node.children[0].text) || ""; if (el.textContent !== expected) el.textContent = expected; } }}
                                                    onFocus={() => { editingBlocksRef.current.add(node.id); setFakeCursorId(null); }}
                                                    onBlur={() => { editingBlocksRef.current.delete(node.id); }}
                                                    onInput={(e) => handleParagraphInput(e, node.id)}
                                                    onKeyDown={(e) => handleParagraphKeyDown(e, node.id)}
                                                    onCompositionStart={() => { isComposingRef.current = true; }}
                                                    onCompositionEnd={() => { isComposingRef.current = false; }}
                                                    style={{ fontSize: 16, color: "var(--text-main)", lineHeight: 1.75, outline: "none", minHeight: "1em", whiteSpace: "pre-wrap" }} />
                                            </div>
                                        );
                                    }
                                    if (node.type === "attachment") {
                                        const file = files[node.fileId];
                                        const isImage = file && file.type && file.type.startsWith("image/");
                                        const handleAttachmentClick = (e) => {
                                            if (!editorRef.current) return;
                                            const rect = e.currentTarget.getBoundingClientRect();
                                            if (e.clientX < rect.right - 32) return;
                                            setFakeCursorId(node.id);
                                            const doc = docRef.current;
                                            const idx = doc.findIndex(n => n.id === node.id);
                                            const next = doc[idx + 1];
                                            if (!next || next.type !== "paragraph") return;
                                            const paragraphs = editorRef.current.querySelectorAll('[data-type="paragraph"]');
                                            if (!paragraphs) return;
                                            const nextIdx = doc.slice(0, idx + 1).filter(n => n.type === "paragraph").length;
                                            const targetEl = paragraphs[nextIdx];
                                            if (!targetEl) return;
                                            targetEl.focus();
                                            const range = document.createRange();
                                            const textNode = targetEl.firstChild || targetEl;
                                            range.setStart(textNode, 0);
                                            range.collapse(true);
                                            const sel = window.getSelection();
                                            sel.removeAllRanges();
                                            sel.addRange(range);
                                        };
                                        return (
                                            <div key={node.id} className="block" draggable onDragStart={(e) => onDragStart(e, node.id)} onDragEnd={onDragEnd} onDragOver={(e) => onDragOver(e, realIndex)} onClick={handleAttachmentClick} style={{ position: "relative", margin: "8px 0" }}>
                                                {dragOverIndex === realIndex && <div className="drop-indicator" />}
                                                {!file ? <div className="attachment-placeholder" /> : isImage ? <div style={{ position: "relative" }}><LazyImage file={file} />{fakeCursorId === node.id && <div className="fake-cursor" />}</div> : <div style={{ position: "relative", display: "flex", alignItems: "center", gap: 12, padding: 12, background: "var(--card-bg)", borderRadius: 12 }}><span style={{ fontSize: 28 }}>📄</span><div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 500 }}>{file.name}</div><div style={{ fontSize: 11, color: "var(--text-secondary)" }}>{(file.size/1024).toFixed(1)} KB</div></div>{fakeCursorId === node.id && <div className="fake-cursor" />}</div>}
                                            </div>
                                        );
                                    }
                                    return null;
                                })}
                            </div>
                        </div>
                        <div style={{ height: 40 }} />
                    </div>
                    <input ref={fileInputRef} type="file" multiple accept="image/*,application/pdf,text/plain" onChange={handleFilesSelected} style={{ display: "none" }} />
                </div>
            );
        }

        /* ---------- 备份视图 ---------- */
        const BackupView = ({ onClose }) => {
            const [googleToken, setGoogleToken] = useState(localStorage.getItem('google_token') || null);
            const [status, setStatus] = useState('');

            const handleExportLocal = useCallback(async () => {
                try {
                    const memos = JSON.parse(localStorage.getItem('memos_app_v2') || '[]');
                    const cleanMemos = memos.map(m => ({ ...m, doc: m.doc ? m.doc.map(n => { if (n.thumbDataUrl) { const { thumbDataUrl, ...rest } = n; return rest; } return n; }) : m.doc }));
                    const backup = { version: 1, exportedAt: new Date().toISOString(), memos: cleanMemos, attachments: {} };
                    const db = await getDB();
                    const allKeys = await new Promise(res => { const tx = db.transaction('attachments', 'readonly'); const req = tx.objectStore('attachments').getAllKeys(); req.onsuccess = () => res(req.result); });
                    for (const key of allKeys) {
                        const record = await loadAttachmentFromDB(db, key);
                        if (record) backup.attachments[key] = { name: record.name, type: record.type, size: record.size, dataUrl: record.url, thumb: record.thumb || null };
                    }
                    const jsonStr = JSON.stringify(backup);
                    const blob = new Blob([jsonStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `此刻备份_${new Date().toISOString().slice(0, 10)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    setStatus('✅ 本地备份已下载');
                } catch (e) { setStatus('❌ 导出失败: ' + e.message); }
            }, []);

            const handleImportLocal = useCallback(async () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        const text = await file.text();
                        const backup = JSON.parse(text);
                        if (!backup.memos || !Array.isArray(backup.memos)) throw new Error('无效的备份文件');
                        const oldMemos = JSON.parse(localStorage.getItem('memos_app_v2') || '[]');
                        const db = await getDB();
                        for (const m of oldMemos) {
                            if (m.doc) for (const n of m.doc) if (n.type === 'attachment') await deleteAttachmentFromDB(db, n.fileId).catch(() => {});
                        }
                        localStorage.setItem('memos_app_v2', JSON.stringify(backup.memos));
                        if (backup.attachments) {
                            for (const [id, att] of Object.entries(backup.attachments)) {
                                // ★ 修复：加入 thumb 字段
                                await saveAttachmentToDB(db, { id, name: att.name, type: att.type, size: att.size, url: att.dataUrl, thumb: att.thumb || null });
                            }
                        }
                        setStatus('✅ 恢复成功！正在刷新页面...');
                        setTimeout(() => window.location.reload(), 800);
                    } catch (e) { setStatus('❌ 导入失败: ' + e.message); }
                };
                input.click();
            }, []);

            const handleGoogleAuth = useCallback(() => {
                if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
                    setStatus('❌ Google API 未加载，请刷新页面后重试');
                    return;
                }
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.appdata',
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            setGoogleToken(tokenResponse.access_token);
                            localStorage.setItem('google_token', tokenResponse.access_token);
                            setStatus('✅ Google 账号已连接');
                        } else {
                            setStatus('❌ 授权失败，请重试');
                        }
                    },
                });
                client.requestAccessToken();
            }, []);

            const handleGoogleLogout = useCallback(() => {
                if (googleToken && typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
                    google.accounts.oauth2.revoke(googleToken, () => {});
                }
                setGoogleToken(null);
                localStorage.removeItem('google_token');
                setStatus('已断开 Google 账号');
            }, [googleToken]);

            // ★ 使用可恢复上传 (Resumable Upload)
            const handleCloudBackup = useCallback(async () => {
                if (!googleToken) return setStatus('❌ 请先连接 Google 账号');
                setStatus('正在上传到云端...');
                try {
                    const memos = JSON.parse(localStorage.getItem('memos_app_v2') || '[]');
                    const cleanMemos = memos.map(m => ({ ...m, doc: m.doc ? m.doc.map(n => { if (n.thumbDataUrl) { const { thumbDataUrl, ...rest } = n; return rest; } return n; }) : m.doc }));
                    const backup = { version: 1, exportedAt: new Date().toISOString(), memos: cleanMemos, attachments: {} };
                    const db = await getDB();
                    const allKeys = await new Promise(res => { const tx = db.transaction('attachments', 'readonly'); const req = tx.objectStore('attachments').getAllKeys(); req.onsuccess = () => res(req.result); });
                    for (const key of allKeys) {
                        const record = await loadAttachmentFromDB(db, key);
                        if (record) backup.attachments[key] = { name: record.name, type: record.type, size: record.size, dataUrl: record.url, thumb: record.thumb || null };
                    }

                    const jsonStr = JSON.stringify(backup);
                    const blob = new Blob([jsonStr], { type: 'application/json' });
                    const metadata = { name: BACKUP_FILE_NAME, mimeType: 'application/json', parents: ['appDataFolder'] };

                    // 查找已有文件
                    const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${BACKUP_FILE_NAME}' and trashed=false&spaces=appDataFolder&fields=files(id)`, { headers: { Authorization: `Bearer ${googleToken}` } });
                    const listData = await listResp.json();
                    let fileId = null;
                    if (listData.files && listData.files.length > 0) fileId = listData.files[0].id;

                    const initMethod = fileId ? 'PATCH' : 'POST';
                    const initUrl = fileId
                        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=resumable`
                        : `https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable`;

                    // 第一步：建立上传会话
                    const initResp = await fetch(initUrl, {
                        method: initMethod,
                        headers: {
                            'Authorization': `Bearer ${googleToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(metadata)
                    });

                    if (!initResp.ok) {
                        const errData = await initResp.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `建立上传会话失败 HTTP ${initResp.status}`);
                    }

                    const uploadUrl = initResp.headers.get('Location');
                    if (!uploadUrl) throw new Error('无法获取上传会话链接');

                    // 第二步：直接 PUT 文件内容
                    const uploadResp = await fetch(uploadUrl, {
                        method: 'PUT',
                        headers: { 'Content-Type': blob.type },
                        body: blob
                    });

                    if (!uploadResp.ok) {
                        const errData = await uploadResp.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `上传失败 HTTP ${uploadResp.status}`);
                    }

                    setStatus('✅ 云端备份完成');
                } catch (e) { setStatus('❌ 云端备份失败: ' + e.message); }
            }, [googleToken]);

            const handleCloudRestore = useCallback(async () => {
                if (!googleToken) return setStatus('❌ 请先连接 Google 账号');
                setStatus('正在从云端下载...');
                try {
                    const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${BACKUP_FILE_NAME}' and trashed=false&spaces=appDataFolder&fields=files(id)`, { headers: { Authorization: `Bearer ${googleToken}` } });
                    const listData = await listResp.json();
                    if (!listData.files || listData.files.length === 0) return setStatus('❌ 云端无备份文件');
                    const fileId = listData.files[0].id;
                    const dlResp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${googleToken}` } });
                    const backup = await dlResp.json();
                    if (!backup.memos) throw new Error('无效的备份文件');
                    const oldMemos = JSON.parse(localStorage.getItem('memos_app_v2') || '[]');
                    const db = await getDB();
                    for (const m of oldMemos) {
                        if (m.doc) for (const n of m.doc) if (n.type === 'attachment') await deleteAttachmentFromDB(db, n.fileId).catch(() => {});
                    }
                    localStorage.setItem('memos_app_v2', JSON.stringify(backup.memos));
                    if (backup.attachments) {
                        for (const [id, att] of Object.entries(backup.attachments)) {
                            // ★ 修复：加入 thumb 字段
                            await saveAttachmentToDB(db, { id, name: att.name, type: att.type, size: att.size, url: att.dataUrl, thumb: att.thumb || null });
                        }
                    }
                    setStatus('✅ 云端恢复成功！正在刷新页面...');
                    setTimeout(() => window.location.reload(), 800);
                } catch (e) { setStatus('❌ 云端恢复失败: ' + e.message); }
            }, [googleToken]);

            return (
                <div style={{ background: "var(--primary-bg)", minHeight: "100vh" }}>
                    <button className="editor-fab left" onClick={onClose}>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                    </button>
                    <div className="page-title compact" style={{ visibility: "visible", opacity: 1, pointerEvents: "none" }}>设置</div>
                    <header style={{ background: "transparent", pointerEvents: "none" }}><div style={{ height: 44 }}></div></header>
                    <div style={{ padding: "30px 20px 0", paddingBottom: "calc(env(safe-area-inset-bottom) + 40px)" }}>
                        <h2 style={{ fontSize: 24, fontWeight: 700, marginBottom: 20 }}>数据备份与恢复</h2>
                        {status && <div className="backup-status">{status}</div>}

                        <div className="backup-card">
                            <h3>📦 本地备份</h3>
                            <p>导出备份文件到设备本地，可手动分享或保存。</p>
                            <button className="backup-btn" onClick={handleExportLocal}>导出备份</button>
                            <button className="backup-btn" onClick={handleImportLocal}>导入备份</button>
                        </div>

                        <div className="backup-card">
                            <h3>☁️ Google Drive 云备份</h3>
                            <p>{googleToken ? '✅ 已连接 Google 账号' : '连接 Google 账号以实现云端备份与恢复。'}</p>
                            {!googleToken ? (
                                <button className="backup-btn" onClick={handleGoogleAuth}>连接 Google 账号</button>
                            ) : (
                                <button className="backup-btn" onClick={handleGoogleLogout}>断开账号</button>
                            )}
                            {googleToken && (
                                <>
                                    <button className="backup-btn" onClick={handleCloudBackup}>上传到云端</button>
                                    <button className="backup-btn" onClick={handleCloudRestore}>从云端恢复</button>
                                </>
                            )}
                        </div>

                        <div className="backup-card">
                            <h3>🦖 关于此刻</h3>
                            <p style={{ fontStyle: "italic" }}>此刻，值得被记住。</p>
                            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <span style={{ fontSize: 14, color: "var(--text-secondary)" }}>版本</span>
                                    <span style={{ fontSize: 14, color: "var(--text-main)" }}>v1.0.0</span>
                                </div>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <span style={{ fontSize: 14, color: "var(--text-secondary)" }}>联系我们</span>
                                    <a href="mailto:yanmiao822@gmail.com" style={{ fontSize: 14, color: "#007AFF", textDecoration: "none" }}>yanmiao822@gmail.com</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ---------- MemoList ---------- */
        function MemoList() {
            const [memos, setMemos] = useState(() => {
                try {
                    const saved = localStorage.getItem("memos_app_v2");
                    const parsed = saved ? JSON.parse(saved) : [];
                    return parsed.map(m => {
                        if (!m.doc && m.content !== undefined) {
                            return Object.assign({}, m, { doc: [{ id: genId(), type: "paragraph", children: [{ text: m.content || "" }] }], content: undefined });
                        }
                        if (!m.doc) return Object.assign({}, m, { doc: [{ id: genId(), type: "paragraph", children: [{ text: "" }] }] });
                        if (!m.createdAt) m.createdAt = m.updatedAt || new Date().toISOString();
                        return m;
                    });
                } catch { return []; }
            });
            const [editingMemoId, setEditingMemoId] = useState(null);
            const editingMemo = editingMemoId ? memos.find(m => m.id === editingMemoId) || null : null;
            const scrollRestoreRef = useRef(0);
            const [backupView, setBackupView] = useState(false);

            const [scrollY, setScrollY] = useState(0);
            const TITLE_THRESHOLD = 30;

            const scrollTimerRef = useRef(null);
            const rafRef = useRef(null);
            useEffect(() => {
                const titleEl = document.querySelector('.page-title');
                const handleScroll = () => {
                    if (rafRef.current) return;
                    rafRef.current = requestAnimationFrame(() => {
                        rafRef.current = null;
                        setScrollY(Math.max(0, window.scrollY));
                        if (titleEl) titleEl.classList.add('scrolling');
                        clearTimeout(scrollTimerRef.current);
                        scrollTimerRef.current = setTimeout(() => { if (titleEl) titleEl.classList.remove('scrolling'); }, 200);
                    });
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => { window.removeEventListener('scroll', handleScroll); clearTimeout(scrollTimerRef.current); if (rafRef.current) cancelAnimationFrame(rafRef.current); };
            }, []);

            const shrinkProgress = Math.min(Math.max(scrollY / TITLE_THRESHOLD, 0), 1);
            const titleScale = 1 - shrinkProgress * 0.45;
            const titleTranslateY = shrinkProgress * -4;
            const titleOpacity = 1 - shrinkProgress * 0.3;
            const isCompact = shrinkProgress >= 1;

            useEffect(() => {
                try {
                    const safe = memos.map(m => ({ ...m, doc: m.doc ? m.doc.map(n => { if (n.thumbDataUrl) { const { thumbDataUrl, ...rest } = n; return rest; } return n; }) : m.doc }));
                    localStorage.setItem("memos_app_v2", JSON.stringify(safe));
                } catch (e) { }
            }, [memos]);

            const openEditor = (memo) => { if (memo.id === NEW_CARD_ID) { handleNew(); return; } scrollRestoreRef.current = window.scrollY; setEditingMemoId(memo.id); };
            const closeEditor = () => { const savedScroll = scrollRestoreRef.current; setEditingMemoId(null); if (savedScroll > 0) { requestAnimationFrame(() => { requestAnimationFrame(() => { window.scrollTo(0, savedScroll); }); }); } };

            const handleNew = () => {
                const now = new Date().toISOString();
