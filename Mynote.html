    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>此刻</title>

    <!-- 基础库 -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tiptap/react@2.6.6/dist/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tiptap/starter-kit@2.6.6/dist/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tiptap/extension-image@2.6.6/dist/index.umd.js"></script>

    <style>
        /* 样式与之前完全相同，此处省略以节省篇幅，你可以从上一版代码中复制粘贴 */
    </style>
</head>
<body>
    <div id="memo-list-root"></div>
    <div id="load-error" style="display:none; padding: 20px; text-align: center; color: var(--text-secondary);">
        <p>⚠️ 依赖加载失败</p>
        <p style="margin-top:8px; font-size:14px;">如果你使用 file:// 协议打开此文件，请改用本地服务器：</p>
        <p style="font-size:13px; margin-top:4px;"><code>python3 -m http.server 8000</code> 或 <code>npx serve .</code></p>
    </div>

    <script>
        // 全局依赖检测
        window.__LOAD_STATUS = {};
        const requiredBase = ['React', 'ReactDOM'];
        const requiredTiptap = {
            'tiptap': 'Tiptap Core',
            'TiptapReact': 'Tiptap React',
            'TiptapStarterKit': 'Starter Kit',
            'TiptapExtensionImage': 'Image Extension'
        };

        function checkBaseLibs() {
            for (const name of requiredBase) {
                if (typeof window[name] === 'undefined') return false;
            }
            return true;
        }
        function checkTiptapLibs() {
            for (const [global, label] of Object.entries(requiredTiptap)) {
                if (typeof window[global] === 'undefined') return false;
            }
            return true;
        }

        window.addEventListener('error', (e) => {
            if (e.target.tagName === 'SCRIPT') {
                document.getElementById('load-error').style.display = 'block';
                document.getElementById('memo-list-root').style.display = 'none';
            }
        }, true);
    </script>

    <script type="text/babel">
        // 基础检查
        if (!checkBaseLibs()) {
            document.getElementById('load-error').style.display = 'block';
            document.getElementById('memo-list-root').style.display = 'none';
            throw new Error('React 或 ReactDOM 未加载，应用无法启动');
        }

        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // Tiptap 可用性
        const TIPTA_AVAILABLE = checkTiptapLibs();
        let EditorContent, useEditor, ReactNodeViewRenderer, StarterKit, Image;
        let AttachmentNode = null;
        if (TIPTA_AVAILABLE) {
            const { Editor, Node } = tiptap;
            EditorContent = TiptapReact.EditorContent;
            useEditor = TiptapReact.useEditor;
            ReactNodeViewRenderer = TiptapReact.ReactNodeViewRenderer;
            StarterKit = TiptapStarterKit.default || TiptapStarterKit;
            Image = TiptapExtensionImage.default || TiptapExtensionImage;

            // 定义附件节点（仅当 Tiptap 可用时）
            AttachmentNode = Node.create({
                name: "attachment",
                group: "block",
                atom: true,
                selectable: true,
                draggable: true,
                addAttributes() {
                    return {
                        attachmentId: { default: null },
                        name: { default: "" },
                        type: { default: "" },
                        size: { default: 0 },
                    };
                },
                parseHTML() { return [{ tag: "div[data-attachment]" }]; },
                renderHTML({ HTMLAttributes }) { return ["div", { "data-attachment": "", ...HTMLAttributes }]; },
                addNodeView() { return ReactNodeViewRenderer(AttachmentComponent); },
            });
        }

        /* ---------- IndexedDB Helper ---------- */
        // ... 保持不变，与上一版完全相同
        // 建议你直接复制上一版完整代码中 from "IndexedDB Helper" 到最后的全部内容
        // 此处因篇幅不再重复粘贴，但实际使用时必须包含全部功能代码
    </script>

    <script>
        /* PWA helper */
        (function() {
            if (("standalone" in window.navigator) && window.navigator.standalone) {
                document.addEventListener("click", function(e) {
                    let nod = e.target;
                    while (nod && nod.nodeName !== "A") nod = nod.parentNode;
                    if (nod && "href" in nod && (nod.href.indexOf(window.location.host) !== -1 || nod.href.startsWith("/") || nod.href.startsWith("#"))) {
                        e.preventDefault();
                        window.location.href = nod.href;
                    }
                }, false);
            }
        })();
    </script>
</body>
</html>
